<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>맘솔브 통합 대시보드 V5</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* Apple dark-mode tile palette (per provided design spec) */
    --bg: #1d1d1f;                 /* ink — deepest canvas */
    --bg-sidebar: #252527;         /* surface-tile-3 */
    --bg-main: #1d1d1f;
    --bg-soft: #2a2a2c;            /* surface-tile-2 — KPI / soft chips */
    --bg-card: #272729;            /* surface-tile-1 — cards */
    --text: #ffffff;               /* body-on-dark */
    --text-soft: #cccccc;          /* body-muted */
    --text-faint: #7a7a7a;         /* ink-muted-48 */
    --line: rgba(255,255,255,0.10);
    --line-soft: rgba(255,255,255,0.06);
    --blue: #2997ff;               /* primary-on-dark (Sky Link Blue) */
    --blue-soft: rgba(41,151,255,0.16);
    --hover: rgba(255,255,255,0.06);
    --selected: rgba(41,151,255,0.18);
    --apple-blue: #2997ff;
    --apple-green: #34c759;
    --apple-orange: #ff9500;
    --apple-red: #ff3b30;
    --apple-purple: #af52de;
    --apple-pink: #ff2d92;
    --apple-teal: #5ac8fa;
    --apple-indigo: #5856d6;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', 'Apple SD Gothic Neo', '맑은 고딕', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
  }
  .app { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }

  /* ========== 노션 스타일 좌측 사이드바 ========== */
  .sidebar {
    background: var(--bg-sidebar);
    border-right: 1px solid var(--line);
    padding: 12px 8px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .workspace {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; margin-bottom: 14px;
    border-radius: 4px; cursor: pointer;
  }
  .workspace:hover { background: var(--hover); }
  .ws-icon {
    width: 22px; height: 22px; border-radius: 5px;
    background: linear-gradient(135deg, #ff9a56, #ff6b9d);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 12px; font-weight: 700;
  }
  .ws-name { font-size: 13.5px; font-weight: 600; flex: 1; }
  .ws-caret { color: var(--text-faint); font-size: 10px; }

  .nav-section { margin-bottom: 16px; }
  .nav-section-title {
    font-size: 11.5px; color: var(--text-faint); font-weight: 500;
    padding: 4px 10px; margin-bottom: 2px;
    text-transform: none;
  }
  .nav-item {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 8px; margin: 1px 0;
    border-radius: 4px; cursor: pointer;
    font-size: 14px; color: var(--text);
    line-height: 1.3; user-select: none;
  }
  .nav-item:hover { background: var(--hover); }
  .nav-item.active { background: var(--selected); font-weight: 600; }
  .nav-item .caret {
    color: var(--text-faint); width: 14px; text-align: center;
    font-size: 10px; opacity: 0; transition: opacity 0.1s;
  }
  .nav-item:hover .caret { opacity: 1; }
  .nav-item .icon {
    width: 18px; text-align: center; font-size: 15px;
    color: var(--text-soft); flex-shrink: 0;
  }
  .nav-item .label { flex: 1; }
  .nav-item .plus {
    color: var(--text-faint); font-size: 14px;
    width: 18px; text-align: center; opacity: 0;
  }
  .nav-item:hover .plus { opacity: 1; }
  .nav-children { margin-left: 18px; }

  /* ========== 메인 ========== */
  .main { background: var(--bg-main); }

  /* 상단 필터 바 (체크박스 영역) */
  .filter-bar {
    padding: 18px 36px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-main);
    position: sticky; top: 0; z-index: 10;
  }
  .filter-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .breadcrumb { font-size: 12.5px; color: var(--text-soft); }
  .breadcrumb .sep { margin: 0 6px; color: var(--text-faint); }
  .page-title { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 10px; }
  .page-emoji { font-size: 28px; margin-right: 6px; }

  .filter-row {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .filter-group {
    display: flex; align-items: center; gap: 6px;
  }
  .filter-label {
    font-size: 11.5px; color: var(--text-faint); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em;
    margin-right: 4px;
  }

  /* 애플 스타일 체크박스 칩 (dark) */
  .chip {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 12px; border-radius: 999px;
    background: rgba(255,255,255,0.06); cursor: pointer; user-select: none;
    font-size: 12.5px; font-weight: 500;
    transition: all 0.15s;
    border: 1px solid transparent;
    color: var(--text);
  }
  .chip input { display: none; }
  .chip .swatch { width: 8px; height: 8px; border-radius: 50%; }
  .chip.on {
    background: var(--bg-card); border-color: var(--line);
  }
  .chip.off { opacity: 0.4; }
  .chip.off .swatch { background: #555 !important; }

  .filter-select {
    padding: 7px 30px 7px 12px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--bg-card);
    font-size: 13px; color: var(--text);
    font-family: inherit; cursor: pointer;
    -webkit-appearance: none; appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%23cccccc' d='M6 8L0 0h12z'/></svg>");
    background-repeat: no-repeat; background-position: right 10px center;
  }

  /* 컨텐츠 영역 */
  .content { padding: 24px 36px 60px; }

  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
  .kpi {
    background: var(--bg-soft); border-radius: 12px; padding: 18px 20px;
  }
  .kpi .l { font-size: 12px; color: var(--text-soft); margin-bottom: 6px; }
  .kpi .v { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
  .kpi .d { font-size: 12px; margin-top: 5px; font-weight: 500; }
  .d.up { color: var(--apple-green); }
  .d.down { color: var(--apple-red); }

  .card {
    background: var(--bg-card); border: 1px solid var(--line);
    border-radius: 12px; padding: 22px;
  }
  .card-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .card-head h3 { font-size: 15px; font-weight: 600; }
  .card-head .sub { color: var(--text-soft); font-size: 12px; margin-top: 2px; }

  .toggles { display: flex; flex-wrap: wrap; gap: 6px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 14px; }
  .row-trend { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; margin-bottom: 14px; }
  @media (max-width: 1280px) { .row-trend { grid-template-columns: 1fr; } }
  .chart-wrap { height: 280px; position: relative; }
  .rank-row {
    display: grid; grid-template-columns: 70px 1fr 80px;
    align-items: center; gap: 8px; font-size: 12px;
  }
  .rank-bar-wrap { height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
  .rank-bar { height: 100%; border-radius: 4px; }
  .rank-amt { text-align: right; font-variant-numeric: tabular-nums; color: var(--text-soft); }

  table.matrix { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.matrix th, table.matrix td {
    padding: 9px 10px; border-bottom: 1px solid var(--line-soft); text-align: right;
    font-variant-numeric: tabular-nums;
  }
  table.matrix th { color: var(--text-soft); font-weight: 500; font-size: 11.5px; }
  table.matrix td:first-child, table.matrix th:first-child { text-align: left; font-weight: 600; }
  .heat-1 { background: rgba(52,199,89,0.12); }
  .heat-2 { background: rgba(52,199,89,0.22); }
  .heat-3 { background: rgba(52,199,89,0.38); }
  .heat-4 { background: rgba(52,199,89,0.55); font-weight: 600; color: #fff; }
</style>
</head>
<body>

<div class="app">

  <!-- ========== 좌측: 노션 스타일 네비 (체크박스 X) ========== -->
  <aside class="sidebar">
    <div class="workspace">
      <div class="ws-icon">맘</div>
      <div class="ws-name">맘솔브 워크스페이스</div>
      <span class="ws-caret">▼</span>
    </div>

    <div class="nav-section">
      <div class="nav-item active">
        <span class="caret">▾</span>
        <span class="icon">📊</span>
        <span class="label">대시보드</span>
        <span class="plus">+</span>
      </div>
    </div>
  </aside>

  <!-- ========== 메인 ========== -->
  <main class="main">

    <!-- 상단: 3단 구조 = ① 필터링 → ② 체크박스 → (그 밑 결과) -->
    <div class="filter-bar">
      <!-- 미니 breadcrumb (작게) -->
      <div class="filter-top" style="margin-bottom: 12px;">
        <div class="breadcrumb">
          📈 <strong style="color: var(--text);">통합 매출 현황</strong>
          <span class="sep">·</span> <span id="headerDate">로딩 중...</span> · 매일 05:00 자동 갱신
        </div>
      </div>

      <!-- ① 필터링 -->
      <div class="filter-row" style="margin-bottom: 10px;">
        <span class="filter-label">① 기간</span>
        <div class="filter-group">
          <input type="date" class="filter-select" id="startDate" style="padding:7px 10px;">
          <span style="color: var(--text-faint); font-size: 13px;">~</span>
          <input type="date" class="filter-select" id="endDate" style="padding:7px 10px;">
        </div>
        <div class="filter-group" style="margin-left: 8px; gap: 4px;">
          <button class="filter-select quick-btn" data-range="yesterday" type="button" style="cursor:pointer; padding: 7px 10px;">어제</button>
          <button class="filter-select quick-btn" data-range="7" type="button" style="cursor:pointer; padding: 7px 10px;">최근 7일</button>
          <button class="filter-select quick-btn" data-range="14" type="button" style="cursor:pointer; padding: 7px 10px;">최근 14일</button>
          <button class="filter-select quick-btn" data-range="month" type="button" style="cursor:pointer; padding: 7px 10px;">이번 달</button>
          <button class="filter-select quick-btn" data-range="lastmonth" type="button" style="cursor:pointer; padding: 7px 10px;">지난 달</button>
        </div>
        <span class="filter-label" style="margin-left: 16px;">② 제품</span>
        <div class="filter-group">
          <select class="filter-select" id="productSelect">
            <option value="">전체 제품 (매출 합산)</option>
          </select>
        </div>
        <span class="filter-label" style="margin-left: 8px;">옵션</span>
        <div class="filter-group">
          <select class="filter-select" id="optionSelect">
            <option value="all">전체</option>
            <option value="single">단품 구매</option>
            <option value="bundle">다량 구매 (1+1·3+1·3+3 등)</option>
          </select>
        </div>
      </div>

      <!-- ② 체크박스 (채널) -->
      <div class="filter-row">
        <span class="filter-label">② 채널</span>
        <div class="toggles" id="globalChannelToggles"></div>
      </div>
    </div>

    <!-- 컨텐츠 -->
    <div class="content">

      <!-- KPI -->
      <div class="kpis">
        <div class="kpi">
          <div class="l" id="kpiTodayLabel">어제 총매출</div>
          <div class="v" id="kpiTodayValue">—</div>
          <div class="d" id="kpiTodayDelta">—</div>
        </div>
        <div class="kpi">
          <div class="l">이번 달 누적</div>
          <div class="v" id="kpiMonthValue">—</div>
          <div class="d" id="kpiMonthDelta">—</div>
        </div>
        <div class="kpi">
          <div class="l" id="kpiCountLabel">어제 주문 건수</div>
          <div class="v" id="kpiCountValue">—</div>
          <div class="d" id="kpiCountDelta">—</div>
        </div>
        <div class="kpi">
          <div class="l" id="kpiAovLabel">어제 평균 주문 단가</div>
          <div class="v" id="kpiAovValue">—</div>
          <div class="d" id="kpiAovDelta">—</div>
        </div>
      </div>

      <!-- 일별 선그래프 + 채널별 매출액 도넛 (옆으로 배치, 2:1) -->
      <div class="row-trend">

        <section class="card">
          <div class="card-head">
            <div>
              <h3>일별 매출 추이</h3>
              <div class="sub">최근 14일 · 채널별 선 그래프</div>
            </div>
          </div>
          <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
        </section>

        <section class="card">
          <div class="card-head">
            <div>
              <h3>채널별 매출액</h3>
              <div class="sub">오늘 비중</div>
            </div>
          </div>
          <div class="toggles" id="salesToggles" style="margin-bottom: 12px;"></div>
          <div class="chart-wrap" style="height: 180px;"><canvas id="salesChart"></canvas></div>
          <div id="rankList" style="display:flex; flex-direction:column; gap:6px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line-soft);"></div>
        </section>

      </div>

      <!-- 마케팅 유입채널은 [📢 마케팅] 페이지(좌측 네비)에서 별도 노출 -->
      <div style="margin-top: 10px; padding: 10px 14px; background: var(--bg-soft); border-radius: 8px; font-size: 12px; color: var(--text-soft);">
        💡 마케팅 유입채널 분석은 좌측 <strong>📢 마케팅</strong> 페이지에서 별도 노출됩니다.
      </div>

      <!-- 제품별 일별 매트릭스 -->
      <section class="card" style="margin-top: 14px;">
        <div class="card-head">
          <div>
            <h3>제품별 일별 매출 매트릭스</h3>
            <div class="sub">상위 8개 상품 · 최근 7일</div>
          </div>
        </div>
        <div style="overflow-x: auto;">
          <table class="matrix">
            <thead id="matrixHead">
              <tr><th>날짜</th><th>로딩 중...</th></tr>
            </thead>
            <tbody id="matrixBody"></tbody>
          </table>
        </div>
      </section>

    </div>

  </main>
</div>

<script>
// 채널 정의 (시트 키와 1:1) — amount 는 시트 로드 후 채워짐
const channelKeys = ['cafe24','naver','coupang','kakao','mamitalk','ezwel','ezwel_voucher','babybilly'];
const channels = [
  { key: 'cafe24',        name: '카페24',          aliases: ['자사몰','카페24'],          color: '#007aff', amount: 0, selected: false },
  { key: 'naver',         name: '네이버',          aliases: ['네이버'],                   color: '#34c759', amount: 0, selected: false },
  { key: 'coupang',       name: '쿠팡',            aliases: ['쿠팡'],                     color: '#ff9500', amount: 0, selected: false },
  { key: 'kakao',         name: '카카오선물하기',  aliases: ['카카오','카카오선물하기'],  color: '#ff3b30', amount: 0, selected: false },
  { key: 'mamitalk',      name: '마미톡',          aliases: ['마미톡'],                   color: '#af52de', amount: 0, selected: false },
  { key: 'ezwel',         name: '이지웰',          aliases: ['이지웰'],                   color: '#ff2d92', amount: 0, selected: false },
  { key: 'ezwel_voucher', name: '이지웰바우처',    aliases: ['이지웰바우처'],             color: '#5ac8fa', amount: 0, selected: false },
  { key: 'babybilly',     name: '베이비빌리',      aliases: ['베이비빌리'],               color: '#5856d6', amount: 0, selected: false },
];

// products.channel 값 → channel.key 매핑
function productChannelToKey(channelName) {
  if (!channelName) return null;
  for (const c of channels) {
    if (c.aliases.includes(channelName)) return c.key;
  }
  return null;
}

// 활성 채널 key 배열 (0개 선택 = 전체, 1개 이상 = 그것만)
function activeChannelKeys() {
  const selected = channels.filter(c => c.selected).map(c => c.key);
  return selected.length === 0 ? channels.map(c => c.key) : selected;
}
// 활성 채널 key Set
function activeChannelKeySet() { return new Set(activeChannelKeys()); }

// 시트 데이터 캐시 (loadRealData 가 채움)
let SHEET = { daily: [], products: [] };
// 현재 필터 상태 (날짜 picker 기반)
let currentStart = '';  // ISO 'YYYY-MM-DD'
let currentEnd = '';
let currentProduct = '';
let currentOption = 'all';   // 'all' | 'single' | 'bundle'

const trendChart = new Chart(document.getElementById('trendChart'), {
  type: 'line',
  data: {
    labels: [],
    datasets: channels.map(c => ({
      label: c.name,
      data: [],
      borderColor: c.color,
      backgroundColor: c.color + '20',
      borderWidth: 2,
      tension: 0.35,
      pointRadius: 0,
      pointHoverRadius: 5,
      pointBackgroundColor: c.color,
      fill: false,
    }))
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: 'rgba(0,0,0,0.85)', cornerRadius: 8, padding: 10,
        callbacks: { label: (ctx) => `  ${ctx.dataset.label}: ₩${ctx.parsed.y.toLocaleString()}` }
      }
    },
    scales: {
      x: { grid: { display: false }, ticks: { color: '#cccccc', font: { size: 11 } } },
      y: {
        grid: { color: 'rgba(255,255,255,0.08)', drawBorder: false },
        ticks: { color: '#cccccc', font: { size: 11 }, callback: (v) => '₩' + (v/1000) + 'k' }
      }
    }
  }
});

const salesChart = new Chart(document.getElementById('salesChart'), {
  type: 'doughnut',
  data: {
    labels: channels.map(c => c.name),
    datasets: [{
      data: channels.map(c => c.amount),
      backgroundColor: channels.map(c => c.color),
      borderColor: '#272729', borderWidth: 2,
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false, cutout: '62%',
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: 'rgba(0,0,0,0.85)', cornerRadius: 8, padding: 10,
        callbacks: { label: (ctx) => `  ${ctx.label}: ₩${ctx.parsed.toLocaleString()}` }
      }
    }
  }
});

// 채널별 매출 순위는 loadRealData() 가 채움 (mock 제거)

function makeChips(containerId, items, onToggle) {
  const box = document.getElementById(containerId);
  items.forEach((item, idx) => {
    const wrap = document.createElement('label');
    wrap.className = 'chip off';
    wrap.innerHTML = `<input type="checkbox"><span class="swatch" style="background:${item.color}"></span>${item.name}`;
    wrap.querySelector('input').addEventListener('change', (e) => {
      wrap.classList.toggle('on', e.target.checked);
      wrap.classList.toggle('off', !e.target.checked);
      onToggle(idx, e.target.checked);
    });
    box.appendChild(wrap);
  });
}

// 상단 글로벌 채널 칩 — 그래프·도넛 visibility + KPI·매트릭스 재계산
makeChips('globalChannelToggles', channels, (i, on) => {
  channels[i].selected = on;
  trendChart.setDatasetVisibility(i, on);
  trendChart.update();
  const sMeta = salesChart.getDatasetMeta(0);
  if (sMeta.data[i]) sMeta.data[i].hidden = !on;
  salesChart.update();
  // KPI·매트릭스도 재계산
  rerenderAll();
});

makeChips('salesToggles', channels, (i, on) => {
  const meta = salesChart.getDatasetMeta(0);
  meta.data[i].hidden = !on;
  salesChart.update();
});

// 초기 상태: 모든 채널 hidden
channels.forEach((c, i) => {
  trendChart.setDatasetVisibility(i, false);
  const sMeta = salesChart.getDatasetMeta(0);
  if (sMeta.data[i]) sMeta.data[i].hidden = true;
});
trendChart.update();
salesChart.update();

const fmtWon = (n) => '₩ ' + Math.round(n).toLocaleString();
const fmtPct = (n) => (n >= 0 ? '▲ ' : '▼ ') + Math.abs(n).toFixed(1) + '%';
const fmtDelta = (n) => (n >= 0 ? '▲ +' : '▼ ') + Math.abs(n).toLocaleString();

// 기간(start~end)에 따른 daily 행 필터
function pickDailyByRange(start, end) {
  if (!SHEET.daily.length) return [];
  if (!start || !end) return SHEET.daily.slice(-14);
  return SHEET.daily.filter(d => d.date >= start && d.date <= end);
}

// 옵션 필터 적용된 날짜별·채널별 매출 (products 시트 기반)
// 'all' 일 때는 daily 시트 직접 사용 (빠름)
function getValueForDayChannel(date, channelKey) {
  if (currentOption === 'all') {
    const row = SHEET.daily.find(d => d.date === date);
    return row ? (row[channelKey] || 0) : 0;
  }
  return (SHEET.products || [])
    .filter(p =>
      p.date === date
      && productChannelToKey(p.channel) === channelKey
      && passesOptionFilter(p))
    .reduce((sum, p) => sum + (p.amount || 0), 0);
}

// KPI + 헤더 + 차트 전부 다시 그리기
function rerenderAll() {
  if (!SHEET.daily.length) return;

  const all = SHEET.daily;
  const last = all[all.length - 1];
  const prev = all.length > 1 ? all[all.length - 2] : null;

  // 활성 채널 (0개 = 전체)
  const activeKeys = activeChannelKeys();
  const allChannels = channels.every(c => !c.selected); // true 면 전체
  const allOptions = currentOption === 'all';
  // 활성 채널·옵션 합산 (옵션 'all' 이면 daily 직접, 아니면 products 합산)
  const calcDayTotal = (d) => allOptions
    ? activeKeys.reduce((sum, k) => sum + (d[k] || 0), 0)
    : activeKeys.reduce((sum, k) => sum + getValueForDayChannel(d.date, k), 0);

  // === 헤더 날짜
  document.getElementById('headerDate').textContent = last.date;

  // === KPI 4개 (total 은 활성 채널 합산, count/aov 는 전체 채널 — 시트에 채널별 count 없음)
  const todayTotal = calcDayTotal(last);
  const prevTotal = prev ? calcDayTotal(prev) : 0;
  document.getElementById('kpiTodayValue').textContent = fmtWon(todayTotal);
  if (prev && prevTotal > 0) {
    const pct = (todayTotal - prevTotal) / prevTotal * 100;
    const el = document.getElementById('kpiTodayDelta');
    el.textContent = '그제比 ' + fmtPct(pct);
    el.className = 'd ' + (pct >= 0 ? 'up' : 'down');
  } else {
    document.getElementById('kpiTodayDelta').textContent = '-';
  }

  // 이번 달 누적 (last.date 기준 같은 달)
  const lastDt = new Date(last.date);
  const sameMonth = all.filter(d => {
    const dt = new Date(d.date);
    return dt.getFullYear() === lastDt.getFullYear() && dt.getMonth() === lastDt.getMonth();
  });
  const monthSum = sameMonth.reduce((a, d) => a + calcDayTotal(d), 0);
  document.getElementById('kpiMonthValue').textContent = fmtWon(monthSum);
  // 전월 동기 = 지난달 1일~같은 날짜
  const lastMonthSameRange = all.filter(d => {
    const dt = new Date(d.date);
    const targetM = new Date(lastDt.getFullYear(), lastDt.getMonth() - 1, 1);
    return dt.getFullYear() === targetM.getFullYear()
      && dt.getMonth() === targetM.getMonth()
      && dt.getDate() <= lastDt.getDate();
  });
  const lastMonthSum = lastMonthSameRange.reduce((a, d) => a + calcDayTotal(d), 0);
  if (lastMonthSum > 0) {
    const pct = (monthSum - lastMonthSum) / lastMonthSum * 100;
    const el = document.getElementById('kpiMonthDelta');
    el.textContent = '전월 동기 ' + fmtPct(pct);
    el.className = 'd ' + (pct >= 0 ? 'up' : 'down');
  } else {
    document.getElementById('kpiMonthDelta').textContent = '전월 데이터 없음';
  }

  // 오늘 주문 건수 (시트엔 채널별 count 없음 → 전체 채널만 정확. 부분선택 시 '*' 표시)
  const todayCount = last.count || 0;
  const prevCount = prev ? (prev.count || 0) : 0;
  document.getElementById('kpiCountValue').textContent = todayCount.toLocaleString() + (allChannels ? '' : '*');
  if (prev) {
    const diff = todayCount - prevCount;
    const el = document.getElementById('kpiCountDelta');
    el.textContent = '그제比 ' + fmtDelta(diff) + (allChannels ? '' : ' *전체기준');
    el.className = 'd ' + (diff >= 0 ? 'up' : 'down');
  } else {
    document.getElementById('kpiCountDelta').textContent = '-';
  }

  // 평균 주문 단가 (활성 채널 total / 전체 count — 정확하진 않으나 근사)
  const todayAov = todayCount ? Math.round(todayTotal / todayCount) : 0;
  const prevAov = prevCount ? Math.round(prevTotal / prevCount) : 0;
  document.getElementById('kpiAovValue').textContent = fmtWon(todayAov);
  if (prev && prevAov > 0) {
    const pct = (todayAov - prevAov) / prevAov * 100;
    const el = document.getElementById('kpiAovDelta');
    el.textContent = '그제比 ' + fmtPct(pct);
    el.className = 'd ' + (pct >= 0 ? 'up' : 'down');
  } else {
    document.getElementById('kpiAovDelta').textContent = '-';
  }

  // === 일별 트렌드 그래프 (기간·옵션 필터 반영)
  const periodDaily = pickDailyByRange(currentStart, currentEnd);
  const labels = periodDaily.map(d => {
    const dt = new Date(d.date);
    return `${dt.getMonth()+1}/${dt.getDate()}`;
  });
  trendChart.data.labels = labels;
  trendChart.data.datasets.forEach((ds, i) => {
    ds.data = periodDaily.map(d => allOptions
      ? (d[channelKeys[i]] || 0)
      : getValueForDayChannel(d.date, channelKeys[i]));
  });
  trendChart.update();

  // === 도넛 + 채널 amount (기간·옵션 합산 기준)
  channels.forEach(c => {
    c.amount = periodDaily.reduce((a, d) => a + (allOptions
      ? (d[c.key] || 0)
      : getValueForDayChannel(d.date, c.key)), 0);
  });
  salesChart.data.datasets[0].data = channels.map(c => c.amount);
  salesChart.update();

  // === 채널 순위 막대 — 활성 채널만 표시
  const rankBox = document.getElementById('rankList');
  if (rankBox) {
    rankBox.innerHTML = '';
    const activeSet = activeChannelKeySet();
    const visibleCh = channels.filter(c => activeSet.has(c.key) && c.amount > 0);
    const maxAmt = Math.max(...visibleCh.map(c => c.amount), 1);
    const sortedCh = [...visibleCh].sort((a, b) => b.amount - a.amount);
    sortedCh.forEach(c => {
      const w = (c.amount / maxAmt * 100).toFixed(1);
      rankBox.insertAdjacentHTML('beforeend', `
        <div class="rank-row">
          <span style="font-weight:600;">${c.name}</span>
          <div class="rank-bar-wrap"><div class="rank-bar" style="width:${w}%; background:${c.color};"></div></div>
          <span class="rank-amt">₩${(c.amount/1000).toFixed(0)}k</span>
        </div>
      `);
    });
    if (sortedCh.length === 0) {
      rankBox.innerHTML = '<div style="color:var(--text-faint); font-size:12px;">선택 기간 매출 없음</div>';
    }
  }

  // === 제품 매트릭스 — displayName 단위 + 활성 채널 + 옵션 필터
  const periodDates = new Set(periodDaily.map(d => d.date));
  const activeChSet = activeChannelKeySet();
  const prodsInRange = (SHEET.products || []).filter(p => {
    if (!periodDates.has(p.date)) return false;
    if (!passesOptionFilter(p)) return false;
    const chKey = productChannelToKey(p.channel);
    return chKey ? activeChSet.has(chKey) : true;
  });

  // key -> { total, daily: {date->amount} } 그룹핑
  const dispGroups = {};
  prodsInRange.forEach(p => {
    const key = keyOf(p);
    if (!dispGroups[key]) dispGroups[key] = { total: 0, daily: {} };
    dispGroups[key].total += p.amount || 0;
    dispGroups[key].daily[p.date] = (dispGroups[key].daily[p.date] || 0) + (p.amount || 0);
  });

  // 컬럼: 특정 제품 선택됐으면 그것만, 아니면 매출 Top 8
  let cols = [];
  if (currentProduct && dispGroups[currentProduct]) {
    const g = dispGroups[currentProduct];
    cols = [{ repName: currentProduct, daily: g.daily }];
  } else {
    cols = Object.entries(dispGroups)
      .sort((a, b) => b[1].total - a[1].total)
      .slice(0, 8)
      .map(([disp, g]) => ({ repName: disp, daily: g.daily }));
  }

  // thead
  const matrixHead = document.getElementById('matrixHead');
  if (matrixHead) {
    matrixHead.innerHTML = '<tr><th>날짜</th>'
      + cols.map(c => `<th title="${c.repName}">${c.repName}</th>`).join('')
      + '<th>합계</th></tr>';
  }

  // tbody — 기간의 모든 날짜. 색상은 컬럼별 상대값 기준 (자기 컬럼 max 대비)
  const matrixBody = document.getElementById('matrixBody');
  if (matrixBody) {
    matrixBody.innerHTML = '';
    if (cols.length === 0) {
      matrixBody.innerHTML = `<tr><td colspan="2" style="color:var(--text-faint); text-align:center; padding:24px;">선택 기간 제품 매출 없음</td></tr>`;
    } else {
      // 각 컬럼별 max 미리 계산 (heat 비율 산정용)
      cols.forEach(c => {
        c.maxAmt = Math.max(0, ...periodDaily.map(d => c.daily[d.date] || 0));
      });
      periodDaily.forEach(d => {
        let row = `<tr><td>${d.date.slice(5)}</td>`;
        let rowSum = 0;
        cols.forEach(c => {
          const amt = c.daily[d.date] || 0;
          rowSum += amt;
          let heat = '';
          if (amt > 0 && c.maxAmt > 0) {
            const ratio = amt / c.maxAmt;
            if (ratio >= 0.8) heat = 'heat-4';
            else if (ratio >= 0.6) heat = 'heat-3';
            else if (ratio >= 0.35) heat = 'heat-2';
            else if (ratio >= 0.15) heat = 'heat-1';
          }
          row += `<td class="${heat}">${amt ? amt.toLocaleString() : '-'}</td>`;
        });
        row += `<td style="font-weight:700;">${rowSum.toLocaleString()}</td></tr>`;
        matrixBody.insertAdjacentHTML('beforeend', row);
      });
    }
  }
}

// 맘솔브 라인업 매핑 — productName 에서 라인_제품군 추출
function makeDisplayName(productName) {
  if (!productName) return '(이름없음)';
  const n = productName;
  // 1. 임신 X주차 세트
  const setMatch = n.match(/임신\s*(\d+)\s*주차/);
  if (setMatch) return `임신${setMatch[1]}주차_세트`;
  // 2. 브랜드 라인
  const lines = ['튼사렌', '퓨어렌', '흰사렌', '몸사렌', '베베솔브'];
  let line = '';
  for (const l of lines) { if (n.includes(l)) { line = l; break; } }
  // 3. 제품 키워드 (긴 키워드 먼저)
  const products = [
    { kw: '아기 살성크림', d: '아기살성크림' },
    { kw: '아기살성크림', d: '아기살성크림' },
    { kw: '베이비 크림', d: '아기살성크림' },
    { kw: '베이비크림', d: '아기살성크림' },
    { kw: '바디 오일미스트', d: '오일미스트' },
    { kw: '바디오일미스트', d: '오일미스트' },
    { kw: '오일미스트', d: '오일미스트' },
    { kw: '살성크림', d: '살성크림' },
    { kw: '살성오일', d: '살성오일' },
    { kw: '수분크림', d: '수분크림' },
    { kw: '스킨 토너', d: '스킨토너' },
    { kw: '스킨토너', d: '스킨토너' },
    { kw: '에멀전', d: '에멀전' },
    { kw: '착색 앰플', d: '착색앰플' },
    { kw: '착색앰플', d: '착색앰플' },
    { kw: '앰플', d: '착색앰플' },
    { kw: '양배추 크림', d: '양배추크림' },
    { kw: '양배추크림', d: '양배추크림' },
    { kw: '유선크림', d: '양배추크림' },
    { kw: '토너', d: '토너' },
  ];
  let product = '';
  for (const { kw, d } of products) { if (n.includes(kw)) { product = d; break; } }
  if (line && product) return `${line}_${product}`;
  if (product) return product;
  if (line) return line;
  return n.length > 24 ? n.slice(0, 24) + '…' : n;
}

// productId -> displayName 매핑 (같은 pid 안에서 가장 긴 productName 의 displayName 사용)
let _pidToDispCache = null;
function buildPidToDisp() {
  const pidNames = {};
  (SHEET.products || []).forEach(p => {
    const pid = String(p.productId || p.productName || 'unknown');
    if (!pidNames[pid]) pidNames[pid] = [];
    if (p.productName) pidNames[pid].push(p.productName);
  });
  const map = {};
  for (const [pid, names] of Object.entries(pidNames)) {
    const longest = [...new Set(names)].sort((a, b) => b.length - a.length)[0] || pid;
    map[pid] = makeDisplayName(longest);
  }
  _pidToDispCache = map;
  return map;
}
function dispOf(p) {
  if (!_pidToDispCache) buildPidToDisp();
  const pid = String(p.productId || p.productName || 'unknown');
  return _pidToDispCache[pid] || makeDisplayName(p.productName);
}

// 옵션값 추출: productName 끝의 용량(Xml/Xg/X개) 또는 프로모션(X+X) 또는 짧은 옵션값 단독 행
function extractOption(productName) {
  if (!productName) return '';
  const n = productName.trim();
  // 1. 풀네임 끝의 용량·프로모션
  const m = n.match(/(\d+\s*(?:ml|ML|g|G|개|kg|KG))\b/);
  if (m) return m[1].replace(/\s/g, '').toLowerCase();
  const promo = n.match(/(\d+\+\d+)/);
  if (promo) return promo[1];
  // 2. 짧은 옵션값 단독 행 (네이버 케이스: '100ml', '30ml' 같은 행)
  const productKeywords = ['살성크림','살성오일','수분크림','스킨토너','스킨 토너','에멀전','착색앰플','착색 앰플','양배추크림','양배추 크림','아기살성크림','아기 살성크림','오일미스트','토너','앰플','유선크림','베이비크림','베이비 크림','세트'];
  const hasProductKw = productKeywords.some(k => n.includes(k));
  if (!hasProductKw && n.length <= 12) return n;
  return '기본';
}

// 옵션 종류 추출: 'single'(단품) | 'bundle'(다량: 1+1, 3+1, 3+3 등 모든 X+Y 묶음)
// 시트의 option_name 컬럼이 적재되면 그것 사용. 현재는 productName 휴리스틱
function optionTypeOf(p) {
  // 1순위: 시트의 option_name 컬럼 (적재 후)
  if (p.option_name || p.optionName) {
    const opt = (p.option_name || p.optionName).toString();
    if (/\d+\s*\+\s*\d+/.test(opt)) return 'bundle';   // X+Y 모두 다량
    if (/단품|single|^1\s*개$/i.test(opt)) return 'single';
    return 'single'; // 기본 단품
  }
  // 2순위: productName 휴리스틱 (옛 데이터)
  const n = p.productName || '';
  if (/\d+\s*\+\s*\d+/.test(n)) return 'bundle';  // 1+1, 3+1, 3+3, 5+1 등
  return 'single';
}

// 옵션 필터 통과 여부
function passesOptionFilter(p) {
  if (currentOption === 'all') return true;
  return optionTypeOf(p) === currentOption;
}

// 매트릭스/드롭다운 그룹 키 — 항상 displayName (옵션은 별도 필터)
function keyOf(p) {
  return dispOf(p);
}

// 제품 드롭다운 — displayName 단위 (현재 선택 유지)
function populateProductSelect() {
  const sel = document.getElementById('productSelect');
  if (!sel) return;
  const prevValue = sel.value || currentProduct;
  buildPidToDisp();
  const groups = {};
  (SHEET.products || []).forEach(p => {
    if (!passesOptionFilter(p)) return;
    const key = keyOf(p);
    if (!groups[key]) groups[key] = 0;
    groups[key] += p.amount || 0;
  });
  const sorted = Object.entries(groups).sort((a, b) => b[1] - a[1]);
  sel.innerHTML = `<option value="">전체 제품 (매출 합산)</option>`
    + sorted.map(([key]) => `<option value="${key}">${key}</option>`).join('');
  // 이전 선택 복원
  if (prevValue && [...sel.options].some(o => o.value === prevValue)) {
    sel.value = prevValue;
  }
}

// 기본 기간: 종료일 = 어제 (오늘은 아직 적재 X) / 시작일 = 14일 전
function setDefaultRange() {
  if (!SHEET.daily.length) return;
  const fmt = (dt) => dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  const startDt = new Date(yesterday); startDt.setDate(startDt.getDate() - 13);
  currentStart = fmt(startDt);
  currentEnd = fmt(yesterday);
  document.getElementById('startDate').value = currentStart;
  document.getElementById('endDate').value = currentEnd;
  // picker 선택 가능 범위 — 시트 first ~ 어제 (오늘은 클릭 못하게)
  const first = SHEET.daily[0].date;
  document.getElementById('startDate').min = first;
  document.getElementById('startDate').max = currentEnd;
  document.getElementById('endDate').min = first;
  document.getElementById('endDate').max = currentEnd;
}

// localStorage 캐시 (5분 TTL) — 두번째 방문부턴 즉시 표시
const CACHE_KEY = 'momsolve_dashboard_v1';
const CACHE_TTL_MS = 5 * 60 * 1000;
const LAST_REFRESH_KEY = 'momsolve_last_refresh';

function formatTs(date) {
  const pad = (n) => String(n).padStart(2, '0');
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
}
function setLastRefreshDisplay() {
  const el = document.getElementById('lastRefresh');
  if (!el) return;
  const iso = localStorage.getItem(LAST_REFRESH_KEY);
  if (!iso) { el.textContent = '마지막 갱신: —'; return; }
  el.textContent = '마지막 갱신: ' + formatTs(new Date(iso));
}
function markRefreshed() {
  localStorage.setItem(LAST_REFRESH_KEY, new Date().toISOString());
  setLastRefreshDisplay();
}

function readCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj.ts || Date.now() - obj.ts > CACHE_TTL_MS) return null;
    return obj.data;
  } catch (e) { return null; }
}
function writeCache(data) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
  } catch (e) { /* quota 초과 등 무시 */ }
}

function applyData(data, fromCache) {
  SHEET.daily = data.daily || [];
  SHEET.products = data.products || [];
  populateProductSelect();
  setDefaultRange();
  rerenderAll();
  console.log((fromCache ? '⚡ 캐시 ' : '✅ 시트 ') + '로드 완료:', SHEET.daily.length, '일 /', SHEET.products.length, '제품행');
}

async function fetchFromSheet() {
  try {
    // 캐시 우회를 위해 timestamp 쿼리 추가
    const res = await fetch(WEBAPP_URL + '?action=getDashboardData&_=' + Date.now());
    const data = await res.json();
    if (!data.ok || !Array.isArray(data.daily)) {
      document.getElementById('headerDate').textContent = '시트 응답 형식 오류';
      console.warn('시트 응답:', data);
      return;
    }
    writeCache(data);
    applyData(data, false);
    markRefreshed();
  } catch (e) {
    if (!SHEET.daily.length) {
      document.getElementById('headerDate').textContent = '시트 로딩 실패 — F12 콘솔 확인';
    }
    console.error('시트 로드 실패:', e);
  }
}

// 수동 갱신 — 캐시 무시하고 시트 다시 fetch
async function manualRefresh() {
  const btn = document.getElementById('refreshBtn');
  const lastEl = document.getElementById('lastRefresh');
  if (btn) { btn.disabled = true; btn.textContent = '🔄 갱신 중...'; }
  if (lastEl) lastEl.textContent = '갱신 중...';
  localStorage.removeItem(CACHE_KEY); // 캐시 비우기
  try {
    await fetchFromSheet();
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🔄 수동 갱신'; }
  }
}

async function loadRealData() {
  // 1) 캐시 있으면 즉시 렌더 (즉각 반응) + 백그라운드에서 최신 가져오기
  const cached = readCache();
  if (cached) {
    applyData(cached, true);
  } else {
    document.getElementById('headerDate').textContent = '시트 데이터 로딩 중... (첫 방문 5~7초)';
  }
  // 2) 백그라운드에서 최신 가져와 화면 갱신
  await fetchFromSheet();
}

// 필터 변경 시 재렌더
document.getElementById('startDate').addEventListener('change', (e) => {
  currentStart = e.target.value;
  rerenderAll();
});
document.getElementById('endDate').addEventListener('change', (e) => {
  currentEnd = e.target.value;
  rerenderAll();
});
document.getElementById('productSelect').addEventListener('change', (e) => {
  currentProduct = e.target.value;
  rerenderAll();
});
document.getElementById('optionSelect').addEventListener('change', (e) => {
  currentOption = e.target.value;
  // currentProduct 유지 (영종님 선택 보존)
  populateProductSelect();
  // 드롭다운에 현재 선택 복원
  const sel = document.getElementById('productSelect');
  if (currentProduct && [...sel.options].some(o => o.value === currentProduct)) {
    sel.value = currentProduct;
  } else {
    currentProduct = '';
    sel.value = '';
  }
  rerenderAll();
});
// 빠른 기간 버튼 — 모두 picker 의 날짜를 수정 + 재렌더 (어제 기준)
function applyQuickRange(range) {
  const fmt = (dt) => dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  let s, e;
  if (range === 'yesterday') {
    s = e = fmt(yesterday);
  } else if (range === '7' || range === '14') {
    const n = parseInt(range, 10);
    const startDt = new Date(yesterday);
    startDt.setDate(startDt.getDate() - (n - 1));
    s = fmt(startDt); e = fmt(yesterday);
  } else if (range === 'month') {
    s = fmt(new Date(today.getFullYear(), today.getMonth(), 1));
    e = fmt(yesterday);  // 이번달 1일~어제
    if (s > e) s = e;     // 이번달 1일이 어제보다 늦으면 (월 첫날) 한 점
  } else if (range === 'lastmonth') {
    s = fmt(new Date(today.getFullYear(), today.getMonth() - 1, 1));
    e = fmt(new Date(today.getFullYear(), today.getMonth(), 0));
  }
  currentStart = s;
  currentEnd = e;
  document.getElementById('startDate').value = s;
  document.getElementById('endDate').value = e;
  rerenderAll();
}
document.querySelectorAll('.quick-btn').forEach(btn => {
  btn.addEventListener('click', () => applyQuickRange(btn.dataset.range));
});

// Chart 객체 생성된 후에 호출 (이 스크립트 끝에 있어서 OK)
loadRealData();
</script>
