<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>맘솔브 제품별 매출</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* ===== Design tokens — White + Deep Green/Teal SaaS ===== */
    --primary: #008577;
    --primary-hover: #007364;
    --primary-soft: rgba(0,133,119,0.08);   /* tinted surface */
    --primary-tint: rgba(0,133,119,0.14);   /* selected/active */

    --bg: #ffffff;                 /* page canvas */
    --bg-sidebar: #f3f8f7;         /* soft mint sidebar */
    --bg-main: #ffffff;
    --bg-soft: #f3f8f7;            /* KPI / soft surfaces */
    --bg-muted: #e9eef0;           /* muted secondary bg */
    --bg-card: #ffffff;            /* cards (border-defined) */

    --text: #1f2933;               /* text-main */
    --text-soft: #5f6b6d;          /* text-muted */
    --text-faint: #8a969b;         /* faint */

    --line: #dde5e7;               /* border */
    --line-soft: #eaf0f1;          /* subtle divider */

    --hover: #f3f8f7;              /* hover surface */
    --selected: var(--primary-tint);

    /* accent alias (legacy var name reused by charts/labels) */
    --blue: #008577;
    --blue-soft: var(--primary-soft);

    /* categorical series accents (channel identity) */
    --apple-green: #34c759;
    --apple-orange: #ff9500;
    --apple-red: #ff3b30;
    --apple-purple: #af52de;
    --apple-teal: #5ac8fa;
    --apple-indigo: #5856d6;

    --radius: 10px;
    --radius-sm: 8px;
  }
  body {
    font-family: 'Pretendard', 'Inter', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', '맑은 고딕', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
  }
  .app { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }

  /* ========== 노션 스타일 좌측 사이드바 ========== */
  .sidebar {
    background: var(--bg-sidebar);
    border-right: 1px solid var(--line);
    padding: 12px 8px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .workspace {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; margin-bottom: 14px;
    border-radius: 4px; cursor: pointer;
  }
  .workspace:hover { background: var(--hover); }
  .ws-icon {
    width: 24px; height: 24px; border-radius: 7px;
    background: var(--primary);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 12px; font-weight: 700;
  }
  .ws-name { font-size: 13.5px; font-weight: 600; flex: 1; }
  .ws-caret { color: var(--text-faint); font-size: 10px; }

  .nav-section { margin-bottom: 16px; }
  .nav-section-title {
    font-size: 11.5px; color: var(--text-faint); font-weight: 500;
    padding: 4px 10px; margin-bottom: 2px;
    text-transform: none;
  }
  .nav-item {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 8px; margin: 1px 0;
    border-radius: 4px; cursor: pointer;
    font-size: 14px; color: var(--text);
    line-height: 1.3; user-select: none;
  }
  .nav-item:hover { background: var(--hover); }
  .nav-item.active { background: var(--primary-soft); color: var(--primary); font-weight: 600; }
  .nav-item .caret {
    color: var(--text-faint); width: 14px; text-align: center;
    font-size: 10px; opacity: 0; transition: opacity 0.1s;
  }
  .nav-item:hover .caret { opacity: 1; }
  .nav-item .icon {
    width: 18px; text-align: center; font-size: 15px;
    color: var(--text-soft); flex-shrink: 0;
  }
  .nav-item .label { flex: 1; }
  .nav-item .plus {
    color: var(--text-faint); font-size: 14px;
    width: 18px; text-align: center; opacity: 0;
  }
  .nav-item:hover .plus { opacity: 1; }
  .nav-children { margin-left: 18px; }

  /* ========== 메인 ========== */
  .main { background: var(--bg-main); }

  /* 상단 필터 바 (체크박스 영역) */
  .filter-bar {
    padding: 18px 36px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-main);
    position: sticky; top: 0; z-index: 10;
  }
  .filter-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .breadcrumb { font-size: 12.5px; color: var(--text-soft); }
  .breadcrumb .sep { margin: 0 6px; color: var(--text-faint); }
  .page-title { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 10px; }
  .page-emoji { font-size: 28px; margin-right: 6px; }

  .filter-row {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .filter-group {
    display: flex; align-items: center; gap: 6px;
  }
  .filter-label {
    font-size: 11.5px; color: var(--text-faint); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em;
    margin-right: 4px;
  }

  /* 애플 스타일 체크박스 칩 (dark) */
  .chip {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 7px 13px; border-radius: 999px;
    background: var(--bg-soft); cursor: pointer; user-select: none;
    font-size: 12.5px; font-weight: 500;
    transition: all 0.15s;
    border: 1px solid var(--line);
    color: var(--text-soft);
  }
  .chip input { display: none; }
  .chip .swatch { width: 8px; height: 8px; border-radius: 50%; }
  .chip.on {
    background: var(--primary-soft); border-color: var(--primary); color: var(--primary); font-weight: 600;
  }
  .chip.off { opacity: 1; }
  .chip.off .swatch { background: #c7d0d2 !important; }

  .filter-select {
    padding: 7px 30px 7px 12px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--bg-card);
    font-size: 13px; color: var(--text);
    font-family: inherit; cursor: pointer;
    -webkit-appearance: none; appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%235f6b6d' d='M6 8L0 0h12z'/></svg>");
    background-repeat: no-repeat; background-position: right 10px center;
  }
  /* 빠른 기간 버튼 — 셀렉트와 같은 톤이지만 화살표 X + 라운드 + 충분한 padding */
  button.quick-btn {
    padding: 8px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--line); background: var(--bg-soft);
    font-size: 12.5px; font-weight: 500; color: var(--text);
    font-family: inherit; cursor: pointer;
    background-image: none;
    line-height: 1.4;
    letter-spacing: 0;
    white-space: nowrap;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  button.quick-btn:hover { background: var(--bg-muted); border-color: var(--primary); color: var(--primary); }
  button.quick-btn:active { background: var(--primary); border-color: var(--primary); color: #fff; }

  /* 날짜 picker — native 화살표 사용, custom 화살표 제거, padding 충분히 */
  input[type="date"].filter-select {
    padding: 8px 12px;
    background-image: none;
    min-width: 142px;
    font-variant-numeric: tabular-nums;
    color-scheme: light;
  }
  input[type="date"].filter-select::-webkit-calendar-picker-indicator {
    cursor: pointer;
    margin-left: 4px;
    opacity: 0.55;
  }

  /* 컨텐츠 영역 */
  .content { padding: 28px 36px 64px; }

  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 22px; }
  .kpi {
    background: var(--bg-soft); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 20px 22px;
  }
  .kpi .l { font-size: 12px; color: var(--text-soft); margin-bottom: 8px; }
  .kpi .l .avg { font-size: 11px; color: var(--text-faint); margin-left: 4px; }
  .kpi .v { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }
  .kpi .d { font-size: 12px; margin-top: 6px; font-weight: 500; }
  .d.up { color: var(--primary); }
  .d.down { color: var(--apple-red); }

  .card {
    background: var(--bg-card); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 24px;
  }
  .card-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .card-head h3 { font-size: 15px; font-weight: 600; }
  .card-head .sub { color: var(--text-soft); font-size: 12px; margin-top: 2px; }

  .toggles { display: flex; flex-wrap: wrap; gap: 6px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
  .row-trend { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 1280px) { .row-trend { grid-template-columns: 1fr; } }
  .chart-wrap { height: 280px; position: relative; }
  /* 제품별 매출 표 */
  .ptable { border-collapse: collapse; width: 100%; font-size: 12.5px; }
  .ptable th, .ptable td { padding: 7px 9px; border-bottom: 1px solid var(--line-soft); text-align: right; white-space: nowrap; }
  .ptable th { background: var(--bg-soft); color: var(--text-soft); font-weight: 600; font-size: 11.5px; position: sticky; top: 0; z-index: 1; }
  .ptable th:first-child, .ptable td:first-child { text-align: left; position: sticky; left: 0; background: var(--bg); z-index: 2; }
  .ptable th:first-child { z-index: 3; background: var(--bg-soft); }
  .ptable tr:hover td { background: var(--hover); }
  .ptable tr.total-row td { font-weight: 700; background: var(--bg-soft); border-top: 2px solid var(--line); }
  .ptable td.total-col { font-weight: 700; color: var(--text); background: var(--bg-soft); }
  .ptable .ch-tag { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .rank-row {
    display: grid; grid-template-columns: 70px 1fr 80px;
    align-items: center; gap: 8px; font-size: 12px;
  }
  .rank-bar-wrap { height: 8px; background: var(--bg-muted); border-radius: 4px; overflow: hidden; }
  .rank-bar { height: 100%; border-radius: 4px; }
  .rank-amt { text-align: right; font-variant-numeric: tabular-nums; color: var(--text-soft); }

  table.matrix { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.matrix th, table.matrix td {
    padding: 9px 10px; border-bottom: 1px solid var(--line-soft); text-align: right;
    font-variant-numeric: tabular-nums;
  }
  table.matrix th { color: var(--text-soft); font-weight: 500; font-size: 11.5px; }
  table.matrix td:first-child, table.matrix th:first-child { text-align: left; font-weight: 600; }
  .heat-1 { background: rgba(0,133,119,0.08); }
  .heat-2 { background: rgba(0,133,119,0.16); }
  .heat-3 { background: rgba(0,133,119,0.30); }
  .heat-4 { background: rgba(0,133,119,0.48); font-weight: 600; color: #fff; }
</style>
</head>
<body>

<div class="app">

  <!-- ========== 좌측: 노션 스타일 네비 (체크박스 X) ========== -->
  <aside class="sidebar">
    <div class="workspace">
      <div class="ws-icon">맘</div>
      <div class="ws-name">맘솔브 운영 대시보드</div>
      <span class="ws-caret">▼</span>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">대시보드</div>
      <a class="nav-item" href="index.html" style="text-decoration:none; color:inherit;">
        <span class="caret">▸</span>
        <span class="icon">📊</span>
        <span class="label">채널별 매출</span>
      </a>
      <a class="nav-item active" href="products.html" style="text-decoration:none; color:inherit;">
        <span class="caret">▾</span>
        <span class="icon">📦</span>
        <span class="label">제품별 매출</span>
      </a>
      <div class="nav-item" style="opacity: 0.5; cursor: not-allowed;">
        <span class="caret">▸</span>
        <span class="icon">📢</span>
        <span class="label">마케팅</span>
        <span style="font-size:10px; color:var(--text-faint); margin-left:auto;">예정</span>
      </div>
      <div class="nav-item" style="opacity: 0.5; cursor: not-allowed;">
        <span class="caret">▸</span>
        <span class="icon">🎁</span>
        <span class="label">쿠폰·프로모션</span>
        <span style="font-size:10px; color:var(--text-faint); margin-left:auto;">예정</span>
      </div>
    </div>
  </aside>

  <!-- ========== 메인 ========== -->
  <main class="main">

    <!-- 상단: 3단 구조 = ① 필터링 → ② 체크박스 → (그 밑 결과) -->
    <div class="filter-bar" style="position:relative;">
      <!-- 우측 상단 메모 박스 (항상 표시) — 평소 대비 매출 급증/급감 제품 1개씩 -->
      <div id="memoBox" style="position:absolute; top:0; right:0; width:44%; max-width:780px; background:var(--bg-soft); border:1px solid var(--line); border-radius:10px; padding:13px 16px; box-sizing:border-box;">
        <div style="font-size:12px; color:var(--text-soft); font-weight:700; margin-bottom:9px;">📌 메모 <span id="memoSub" style="color:var(--text-faint); font-weight:400; font-size:11px;"></span></div>
        <div id="memoBody" style="font-size:13px; color:var(--text); line-height:1.85;">로딩 중...</div>
      </div>
      <!-- 미니 breadcrumb (작게) -->
      <div class="filter-top" style="margin-bottom: 12px;">
        <div class="breadcrumb">
          📦 <strong style="color: var(--text);">제품별 매출</strong>
          <span class="sep">·</span> <span id="headerDate">로딩 중...</span> · 매일 05:00 자동 갱신
        </div>
      </div>

      <!-- ① 필터링 -->
      <div class="filter-row" style="margin-bottom: 10px;">
        <span class="filter-label">① 기간</span>
        <div class="filter-group">
          <input type="date" class="filter-select" id="startDate">
          <span style="color: var(--text-faint); font-size: 13px;">~</span>
          <input type="date" class="filter-select" id="endDate">
        </div>
        <div class="filter-group" style="margin-left: 8px; gap: 6px;">
          <button class="quick-btn" data-range="yesterday" type="button">어제</button>
          <button class="quick-btn" data-range="7" type="button">최근 7일</button>
          <button class="quick-btn" data-range="14" type="button">최근 14일</button>
          <button class="quick-btn" data-range="month" type="button">이번 달</button>
          <button class="quick-btn" data-range="lastmonth" type="button">지난 달</button>
        </div>
      </div>

      <!-- ② 체크박스 (채널) -->
      <div class="filter-row">
        <span class="filter-label">② 채널</span>
        <div class="toggles" id="globalChannelToggles"></div>
      </div>
    </div>

    <!-- 컨텐츠 -->
    <div class="content">

      <!-- 옵션 그룹 체크박스 (단품 / 3개 묶음) -->
      <div style="background: var(--bg-soft); padding: 12px 16px; border-radius: 10px; margin-bottom: 14px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap;">
        <span style="font-size: 12px; color: var(--text-soft); font-weight: 600;">옵션 유형</span>
        <label style="cursor:pointer; display: inline-flex; align-items: center; gap: 6px; font-size: 13px;">
          <input type="checkbox" id="optSingle" checked> 단품 (1개·1+1)
        </label>
        <label style="cursor:pointer; display: inline-flex; align-items: center; gap: 6px; font-size: 13px;">
          <input type="checkbox" id="optTriple" checked> 3개 묶음 (3+1·3+3)
        </label>
        <span style="font-size: 11.5px; color: var(--text-faint); margin-left: 8px;">둘 다 체크 시 합산</span>
      </div>

      <section class="card">
        <div class="card-head" style="justify-content: space-between; align-items: center;">
          <div>
            <h3>제품별 매출 표</h3>
            <div class="sub" id="productTableSub">선택 기간 · 활성 채널 합산 (행=날짜, 열=상품 Top, 셀=매출)</div>
          </div>
          <div style="display:flex; gap:6px; align-items:center;">
            <button id="pagePrev" class="quick-btn" type="button">← 이전</button>
            <span id="pageLabel" style="font-size:12.5px; color:var(--text-soft); padding: 0 8px; min-width: 90px; text-align:center;">1 / 2 · 일반</span>
            <button id="pageNext" class="quick-btn" type="button">다음 →</button>
          </div>
        </div>
        <div id="productTableWrap" style="overflow-x:auto; margin-top: 12px;">
          <div style="color:var(--text-faint); font-size:13px;">로딩 중...</div>
        </div>
      </section>

      <section class="card" style="margin-top: 14px;">
        <div class="card-head">
          <div>
            <h3>제품별 일별 매출 추이</h3>
            <div class="sub" id="productTrendSub">선택 기간 · 활성 채널 · 체크한 제품만 선그래프로 표시</div>
          </div>
        </div>
        <div id="productCheckboxRow" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:12px;"></div>
        <div style="position:relative; height:340px; margin-top:14px;"><canvas id="productTrendChart"></canvas></div>
      </section>

    </div>

  </main>
</div>

<script>
// 채널 정의 (시트 키와 1:1) — amount 는 시트 로드 후 채워짐
const channelKeys = ['cafe24','naver','coupang','kakao','mamitalk','babybilly'];
const channels = [
  { key: 'cafe24',        name: '카페24',          aliases: ['자사몰','카페24','맘솔브'],  color: '#ec6f9e', amount: 0, count: 0, selected: false},
  { key: 'naver',         name: '네이버',          aliases: ['네이버'],                   color: '#34c759', amount: 0, count: 0, selected: false},
  { key: 'coupang',       name: '쿠팡',            aliases: ['쿠팡'],                     color: '#ff9500', amount: 0, count: 0, selected: false},
  { key: 'kakao',         name: '카카오선물하기',  aliases: ['카카오','카카오선물하기'],  color: '#ff3b30', amount: 0, count: 0, selected: false},
  { key: 'mamitalk',      name: '마미톡',          aliases: ['마미톡'],                   color: '#af52de', amount: 0, count: 0, selected: false},
  { key: 'babybilly',     name: '베이비빌리',      aliases: ['베이비빌리'],               color: '#5856d6', amount: 0, count: 0, selected: false},
];

// products.channel 값 → channel.key 매핑
function productChannelToKey(channelName) {
  if (!channelName) return null;
  for (const c of channels) {
    if (c.aliases.includes(channelName)) return c.key;
  }
  return null;
}

// 활성 채널 key 배열 (0개 선택 = 전체, 1개 이상 = 그것만)
function activeChannelKeys() {
  const selected = channels.filter(c => c.selected).map(c => c.key);
  return selected.length === 0 ? channels.map(c => c.key) : selected;
}
// 활성 채널 key Set
function activeChannelKeySet() { return new Set(activeChannelKeys()); }

// 선차트 카드 sub 텍스트용
function formatActiveChannelsText() {
  const selected = channels.filter(c => c.selected);
  if (selected.length === 0 || selected.length === channels.length) return '전체 채널';
  return selected.map(c => c.name).join(', ');
}
function formatDateRangeText() {
  if (!currentStart || !currentEnd) return '전체 기간';
  const fmt = (s) => { const dt = new Date(s); return `${dt.getMonth()+1}/${dt.getDate()}`; };
  return currentStart === currentEnd ? fmt(currentStart) : `${fmt(currentStart)} ~ ${fmt(currentEnd)}`;
}

// 시트 데이터 캐시 (loadRealData 가 채움)
// channelCounts 는 v4 Apps Script 가 제공 (배포 전엔 빈 배열 → products.quantity 로 fallback)
let SHEET = { daily: [], channelCounts: [], products: [] };
// 현재 필터 상태 (날짜 picker 기반)
let currentStart = '';  // ISO 'YYYY-MM-DD'
let currentEnd = '';
let currentProduct = '';
let currentOption = 'all';   // 'all' | 'single' | 'bundle'

// 한글 단위 포맷: 1억원 / 1,250만원 / 8,500원 (차트 콜백에서 미리 참조 — 차트 정의 위에 둠)
const fmtWon = (n) => {
  n = Math.round(Number(n) || 0);
  if (n === 0) return '0원';
  const neg = n < 0;
  n = Math.abs(n);
  let out;
  if (n >= 100000000) {
    const eok = n / 100000000;
    out = (Math.round(eok * 10) / 10).toString().replace(/\.0$/, '') + '억원';
  } else if (n >= 10000) {
    out = Math.round(n / 10000).toLocaleString() + '만원';
  } else {
    out = n.toLocaleString() + '원';
  }
  return neg ? '-' + out : out;
};
const fmtPct = (n) => (n >= 0 ? '▲ ' : '▼ ') + Math.abs(n).toFixed(1) + '%';
const fmtDelta = (n) => (n >= 0 ? '▲ +' : '▼ ') + Math.abs(n).toLocaleString();

// 라인 아래 그라데이션 페이드 (color 상단 → 투명 하단)
function makeGradient(color) {
  return (ctx) => {
    const chart = ctx.chart;
    const area = chart.chartArea;
    if (!area) return color + '20';
    const g = chart.ctx.createLinearGradient(0, area.top, 0, area.bottom);
    g.addColorStop(0, color + '55');
    g.addColorStop(1, color + '00');
    return g;
  };
}

function makeChips(containerId, items, onToggle) {
  const box = document.getElementById(containerId);
  items.forEach((item, idx) => {
    const wrap = document.createElement('label');
    wrap.className = 'chip off';
    wrap.innerHTML = `<input type="checkbox"><span class="swatch" style="background:${item.color}"></span>${item.name}`;
    wrap.querySelector('input').addEventListener('change', (e) => {
      wrap.classList.toggle('on', e.target.checked);
      wrap.classList.toggle('off', !e.target.checked);
      onToggle(idx, e.target.checked);
    });
    box.appendChild(wrap);
  });
}

// 옵션 그룹 분류: 'triple' (3개 묶음 = 3+1·3+3) / 'single' (1개·1+1·기타)
// 실제 옵션명 형식: "...제품 3개 + 오일 1개" / "...착색앰플 3개 + 1개 추가증정" → 3개 묶음.
//                  "...제품 1개" / "...1개 (+토너1개 증정)" → 단품.
// 기존 정규식은 '3+1' 처럼 숫자+숫자만 잡아서 "3개 + 오일 1개"를 못 잡음 → 3개 묶음 0건 사고.
function optionGroupOf(p) {
  const opt = String(p.option_name || '').trim();
  const n = String(p.productName || '').trim();
  const candidate = opt || n;
  if (/(^|\D)3\s*개/.test(candidate)) return 'triple';     // "3개" 가 들어가면 3개 묶음
  const m = candidate.match(/(\d+)\s*\+\s*(\d+)/);          // 혹시 모를 "3+1" 순수 숫자 패턴도 커버
  if (m && parseInt(m[1], 10) === 3) return 'triple';
  return 'single';
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// 기간(start~end)에 따른 daily 행 필터
function pickDailyByRange(start, end) {
  if (!SHEET.daily.length) return [];
  if (!start || !end) return SHEET.daily.slice(-14);
  return SHEET.daily.filter(d => d.date >= start && d.date <= end);
}

// 옵션 필터 적용된 날짜별·채널별 매출 (products 시트 기반)
// 'all' 일 때는 daily 시트 직접 사용 (빠름)
function getValueForDayChannel(date, channelKey) {
  if (currentOption === 'all') {
    const row = SHEET.daily.find(d => d.date === date);
    return row ? (row[channelKey] || 0) : 0;
  }
  return (SHEET.products || [])
    .filter(p =>
      p.date === date
      && productChannelToKey(p.channel) === channelKey
      && passesOptionFilter(p))
    .reduce((sum, p) => sum + (p.amount || 0), 0);
}

// 날짜·채널·옵션·제품 필터 통과한 주문 건수
// 옵션 필터 없을 땐 v4 의 channelCounts 시트 사용 (진짜 주문건수)
// 옵션 필터 있을 땐 products.quantity 합산 (옵션별 분해 가능, item count 근사치)
function getCountForDayChannel(date, channelKey) {
  if (currentOption === 'all' && SHEET.channelCounts && SHEET.channelCounts.length) {
    const row = SHEET.channelCounts.find(c => c.date === date);
    if (row) return Number(row[channelKey]) || 0;
  }
  return (SHEET.products || [])
    .filter(p =>
      p.date === date
      && productChannelToKey(p.channel) === channelKey
      && passesOptionFilter(p))
    .reduce((sum, p) => sum + (p.quantity || 0), 0);
}

// 제품별 매출 view — 표 두 개 (날짜×상품 매트릭스 + 합계)
function rerenderAll() {
  if (!SHEET.daily.length) return;

  const last = SHEET.daily[SHEET.daily.length - 1];
  document.getElementById('headerDate').textContent = last.date;

  const activeKeys = activeChannelKeys();
  const activeKeySet = new Set(activeKeys);
  const periodDaily = pickDailyByRange(currentStart, currentEnd);
  const dateSet = new Set(periodDaily.map(d => d.date));

  // products 필터: 기간 내 + 활성 채널 + 옵션 그룹
  // ⚠️ 임시 가드 — 쿠팡 sync 버그로 quantity 위치에 가격이 박힌 row 가 있음
  // amount === 0 이고 quantity 가 매출 단위(>= 100) 이면 실제 매출로 간주
  const filtered = (SHEET.products || []).map(p => {
    if ((!p.amount || p.amount === 0) && p.quantity >= 100) {
      return { ...p, amount: p.quantity, quantity: 1 };
    }
    return p;
  }).filter(p => {
    if (!dateSet.has(p.date)) return false;
    const chKey = productChannelToKey(p.channel);
    if (!activeKeySet.has(chKey)) return false;
    const group = optionGroupOf(p);
    if (group === 'single' && !optionSingleOn) return false;
    if (group === 'triple' && !optionTripleOn) return false;
    // 페이지 필터: 1=일반, 2=세트(임신주차)
    const setRow = isSetProduct(dispOf(p));
    if (currentPage === 1 && setRow) return false;
    if (currentPage === 2 && !setRow) return false;
    return true;
  });

  // 페이지 라벨 갱신
  const pageLabel = document.getElementById('pageLabel');
  if (pageLabel) pageLabel.textContent = `${currentPage} / 2 · ${currentPage === 1 ? '일반' : '세트'}`;
  const prevBtn = document.getElementById('pagePrev');
  const nextBtn = document.getElementById('pageNext');
  if (prevBtn) prevBtn.disabled = (currentPage === 1);
  if (nextBtn) nextBtn.disabled = (currentPage === 2);

  // ===== 표 1: 날짜 × 상품 Top 10 매트릭스 (히트맵 적용) =====
  const productTotals = {};
  const cellMap = {};
  filtered.forEach(p => {
    const name = dispOf(p);
    productTotals[name] = (productTotals[name] || 0) + (p.amount || 0);
    if (!cellMap[p.date]) cellMap[p.date] = {};
    cellMap[p.date][name] = (cellMap[p.date][name] || 0) + (p.amount || 0);
  });
  const topProducts = Object.entries(productTotals)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10)
    .map(([name, total]) => ({ name, total }));
  // 라인(브랜드)별로 묶기: 상품명 '_' 앞부분이 라인.
  // 라인 순서 = 우선순위 라인(튼사렌→퓨어렌) 먼저, 나머지는 라인 매출 큰 순. 라인 안에서는 제품 매출 큰 순
  const lineKeyOf = (n) => (n.split('_')[0] || n);
  const LINE_PRIORITY = ['튼사렌', '퓨어렌'];
  const lineRank = (k) => { const i = LINE_PRIORITY.indexOf(k); return i === -1 ? LINE_PRIORITY.length : i; };
  const lineTotals = {};
  topProducts.forEach(p => { const k = lineKeyOf(p.name); lineTotals[k] = (lineTotals[k] || 0) + p.total; });
  topProducts.sort((a, b) => {
    const la = lineKeyOf(a.name), lb = lineKeyOf(b.name);
    if (la !== lb) {
      const ra = lineRank(la), rb = lineRank(lb);
      if (ra !== rb) return ra - rb;
      return lineTotals[lb] - lineTotals[la];
    }
    return b.total - a.total;
  });

  // 히트맵 색상 — 열(제품) 안에서의 상대값 기준
  // 같은 제품 안에서 높은 날 vs 낮은 날 변별. 매출 작은 제품도 자기 안에서 변화 보임
  const colMax = {};
  topProducts.forEach(p => {
    let m = 0;
    Object.values(cellMap).forEach(row => {
      const v = row[p.name] || 0;
      if (v > m) m = v;
    });
    colMax[p.name] = m;
  });
  const cellColor = (amt, productName) => {
    const mx = colMax[productName] || 0;
    if (amt <= 0 || mx <= 0) return '';
    const ratio = Math.sqrt(amt / mx);
    const alpha = 0.06 + ratio * 0.55;
    return `background: rgba(52,199,89,${alpha.toFixed(2)});`;
  };

  const wrap = document.getElementById('productTableWrap');
  if (topProducts.length === 0) {
    wrap.innerHTML = '<div style="color:var(--text-faint); font-size:13px; padding: 14px;">선택 기간·채널·옵션 조건에 매출 데이터 없음</div>';
  } else {
    let html = '<table class="ptable"><thead><tr><th>날짜</th>';
    topProducts.forEach(p => html += `<th>${escapeHtml(p.name)}</th>`);
    html += '<th class="total-col">합계</th></tr></thead><tbody>';

    const sortedDates = [...dateSet].sort((a, b) => a.localeCompare(b));
    sortedDates.forEach(d => {
      html += `<tr><td>${d}</td>`;
      let rowTotal = 0;
      topProducts.forEach(p => {
        const amt = (cellMap[d] && cellMap[d][p.name]) || 0;
        rowTotal += amt;
        const style = cellColor(amt, p.name);
        html += `<td style="${style}">${amt > 0 ? fmtWon(amt) : '—'}</td>`;
      });
      html += `<td class="total-col">${rowTotal > 0 ? fmtWon(rowTotal) : '—'}</td></tr>`;
    });

    html += '<tr class="total-row"><td>합계</td>';
    let grandTotal = 0;
    topProducts.forEach(p => {
      html += `<td>${fmtWon(p.total)}</td>`;
      grandTotal += p.total;
    });
    html += `<td class="total-col">${fmtWon(grandTotal)}</td></tr>`;
    html += '</tbody></table>';
    wrap.innerHTML = html;
  }

  // ===== 제품별 일별 매출 추이 선그래프 (체크한 제품만) =====
  // 제품 목록: 매트릭스와 동일 정렬 (라인 그룹 → 라인 매출 큰 순 → 라인 내 제품 매출 큰 순)
  const allProductNames = Object.keys(productTotals);
  const allLineTotals = {};
  allProductNames.forEach(n => { const k = lineKeyOf(n); allLineTotals[k] = (allLineTotals[k] || 0) + productTotals[n]; });
  allProductNames.sort((a, b) => {
    const la = lineKeyOf(a), lb = lineKeyOf(b);
    if (la !== lb) {
      const ra = lineRank(la), rb = lineRank(lb);
      if (ra !== rb) return ra - rb;
      return allLineTotals[lb] - allLineTotals[la];
    }
    return productTotals[b] - productTotals[a];
  });

  // 기본값: 아무것도 체크 안 된 상태로 시작 (영종님이 직접 제품 골라서 체크)

  // 체크박스 렌더 (제품명 색 = 선 색, 좌측 보더 = 선 색 → 범례 역할). 라벨은 브랜드 빼고 제품명만
  const cbRow = document.getElementById('productCheckboxRow');
  if (allProductNames.length === 0) {
    cbRow.innerHTML = '<div style="color:var(--text-faint); font-size:13px;">선택 기간·채널·옵션 조건에 제품 매출 없음</div>';
  } else {
    cbRow.innerHTML = allProductNames.map(n => {
      const color = colorForProduct(n);
      const checked = selectedProducts.has(n) ? 'checked' : '';
      return `<label style="cursor:pointer; display:inline-flex; align-items:center; gap:6px; font-size:12.5px; padding:4px 9px; background:var(--bg-soft); border-radius:7px; border-left:3px solid ${color};">`
        + `<input type="checkbox" data-name="${escapeHtml(n)}" ${checked}>`
        + `<span style="color:${color}; font-weight:600;">${escapeHtml(shortName(n))}</span>`
        + `<span style="color:var(--text-faint); font-size:11px;">${fmtWon(productTotals[n])}</span></label>`;
    }).join('');
  }

  // 차트 데이터: X = 기간 내 날짜 오름차순, 라인 = 체크된 제품의 일별 매출
  const trendDates = [...dateSet].sort((a, b) => a.localeCompare(b));
  productTrendChart.data.labels = trendDates.map(d => { const dt = new Date(d); return `${dt.getMonth()+1}/${dt.getDate()}`; });
  productTrendChart.data.datasets = allProductNames.filter(n => selectedProducts.has(n)).map(n => {
    const color = colorForProduct(n);
    return {
      label: shortName(n),
      data: trendDates.map(d => (cellMap[d] && cellMap[d][n]) || 0),
      borderColor: color,
      backgroundColor: makeGradient(color),
      borderWidth: 2, tension: 0.35,
      pointRadius: 3, pointHoverRadius: 6,
      pointBackgroundColor: color, pointBorderColor: '#ffffff', pointBorderWidth: 1.5,
      fill: true,
    };
  });
  productTrendChart.update();

  const tsub = document.getElementById('productTrendSub');
  if (tsub) tsub.textContent = `${formatDateRangeText()} · ${formatActiveChannelsText()} · 체크한 제품만`;

  // ===== 메모 박스: 평소 대비 매출 많이/적게 나온 제품 1개씩 =====
  // 평소(baseline) = 전체 기간 제품별 일평균(전체 일수 기준). 선택기간 = 선택 기간 일평균. 비율로 비교.
  {
    const allDates = new Set();
    const baseTotal = {};
    (SHEET.products || []).forEach(raw => {
      const p = ((!raw.amount || raw.amount === 0) && raw.quantity >= 100) ? { ...raw, amount: raw.quantity } : raw;
      if (!activeKeySet.has(productChannelToKey(p.channel))) return;
      const g = optionGroupOf(p);
      if (g === 'single' && !optionSingleOn) return;
      if (g === 'triple' && !optionTripleOn) return;
      const setRow = isSetProduct(dispOf(p));
      if (currentPage === 1 && setRow) return;
      if (currentPage === 2 && !setRow) return;
      allDates.add(p.date);
      const name = dispOf(p);
      baseTotal[name] = (baseTotal[name] || 0) + (p.amount || 0);
    });
    const baseDayCount = allDates.size || 1;
    const periodDayCount = dateSet.size || 1;
    // 후보: 평소 일평균 10만원 이상인 제품 (자잘한 제품의 과장된 비율 제외)
    const scored = Object.keys(baseTotal)
      .map(n => {
        const baseAvg = baseTotal[n] / baseDayCount;
        const periodAvg = (productTotals[n] || 0) / periodDayCount;
        return { n, baseAvg, periodAvg, ratio: baseAvg > 0 ? periodAvg / baseAvg : 0 };
      })
      .filter(x => x.baseAvg >= 100000)
      .sort((a, b) => a.ratio - b.ratio);
    const down = scored.length ? scored[0] : null;                       // 가장 적게 (비율 최저)
    const up = scored.length > 1 ? scored[scored.length - 1] : null;     // 가장 많이 (비율 최고)
    const body = document.getElementById('memoBody');
    if (body) {
      const line = (icon, label, x, color) => {
        if (!x) return `<div style="color:var(--text-faint);">${icon} ${label}: 데이터 부족</div>`;
        const pct = Math.round((x.ratio - 1) * 100);
        const sign = pct >= 0 ? '+' : '';
        return `<div>${icon} <b>${label}</b>: <span style="color:${color}; font-weight:700;">${escapeHtml(shortName(x.n))}</span>`
          + ` <span style="color:var(--text-soft); font-size:11.5px;">(평소 일 ${fmtWon(x.baseAvg)} → 이 기간 일 ${fmtWon(x.periodAvg)}, ${sign}${pct}%)</span></div>`;
      };
      body.innerHTML = line('📈', '평소보다 많이 나온 제품', up, '#34c759')
        + line('📉', '평소보다 적게 나온 제품', down, '#ff6482');
    }
    const msub = document.getElementById('memoSub');
    if (msub) msub.textContent = `${formatDateRangeText()} · 평소(전체기간) 대비`;
  }

  // sub 텍스트
  const dateText = formatDateRangeText();
  const chanText = formatActiveChannelsText();
  const optText = (optionSingleOn && optionTripleOn) ? '단품+3개 합산'
                : optionSingleOn ? '단품(1개·1+1)'
                : optionTripleOn ? '3개 묶음(3+1·3+3)'
                : '옵션 미선택';
  const sub = document.getElementById('productTableSub');
  if (sub) sub.textContent = `${dateText} · ${chanText} · ${optText} · 행=날짜, 열=상품 Top 10`;
}

// 맘솔브 라인업 매핑 — productName 에서 라인_제품군 추출
function makeDisplayName(productName) {
  if (!productName) return '(이름없음)';
  const n = productName;
  // 1. 임신 X주차 세트
  const setMatch = n.match(/임신\s*(\d+)\s*주차/);
  if (setMatch) return `임신${setMatch[1]}주차_세트`;
  // 2. 브랜드 라인
  const lines = ['튼사렌', '퓨어렌', '흰사렌', '몸사렌', '베베솔브'];
  let line = '';
  for (const l of lines) { if (n.includes(l)) { line = l; break; } }
  // 3. 제품 키워드 (긴 키워드 먼저)
  const products = [
    { kw: '아기 살성크림', d: '아기살성크림' },
    { kw: '아기살성크림', d: '아기살성크림' },
    { kw: '베이비 크림', d: '아기살성크림' },
    { kw: '베이비크림', d: '아기살성크림' },
    { kw: '바디 오일미스트', d: '오일미스트' },
    { kw: '바디오일미스트', d: '오일미스트' },
    { kw: '오일미스트', d: '오일미스트' },
    { kw: '살성크림', d: '살성크림' },
    { kw: '살성오일', d: '살성오일' },
    { kw: '수분크림', d: '수분크림' },
    { kw: '스킨 토너', d: '스킨토너' },
    { kw: '스킨토너', d: '스킨토너' },
    { kw: '에멀전', d: '에멀전' },
    { kw: '착색 앰플', d: '착색앰플' },
    { kw: '착색앰플', d: '착색앰플' },
    { kw: '앰플', d: '착색앰플' },
    { kw: '양배추 크림', d: '양배추크림' },
    { kw: '양배추크림', d: '양배추크림' },
    { kw: '유선크림', d: '양배추크림' },
    { kw: '토너', d: '토너' },
  ];
  let product = '';
  for (const { kw, d } of products) { if (n.includes(kw)) { product = d; break; } }
  if (line && product) return `${line}_${product}`;
  if (product) return product;
  if (line) return line;
  return n.length > 24 ? n.slice(0, 24) + '…' : n;
}

// productId -> displayName 매핑 (같은 pid 안에서 가장 긴 productName 의 displayName 사용)
let _pidToDispCache = null;
function buildPidToDisp() {
  const pidNames = {};
  (SHEET.products || []).forEach(p => {
    const pid = String(p.productId || p.productName || 'unknown');
    if (!pidNames[pid]) pidNames[pid] = [];
    if (p.productName) pidNames[pid].push(p.productName);
  });
  const map = {};
  for (const [pid, names] of Object.entries(pidNames)) {
    const longest = [...new Set(names)].sort((a, b) => b.length - a.length)[0] || pid;
    map[pid] = makeDisplayName(longest);
  }
  _pidToDispCache = map;
  return map;
}
function dispOf(p) {
  if (!_pidToDispCache) buildPidToDisp();
  const pid = String(p.productId || p.productName || 'unknown');
  return _pidToDispCache[pid] || makeDisplayName(p.productName);
}

// 옵션값 추출: productName 끝의 용량(Xml/Xg/X개) 또는 프로모션(X+X) 또는 짧은 옵션값 단독 행
function extractOption(productName) {
  if (!productName) return '';
  const n = productName.trim();
  // 1. 풀네임 끝의 용량·프로모션
  const m = n.match(/(\d+\s*(?:ml|ML|g|G|개|kg|KG))\b/);
  if (m) return m[1].replace(/\s/g, '').toLowerCase();
  const promo = n.match(/(\d+\+\d+)/);
  if (promo) return promo[1];
  // 2. 짧은 옵션값 단독 행 (네이버 케이스: '100ml', '30ml' 같은 행)
  const productKeywords = ['살성크림','살성오일','수분크림','스킨토너','스킨 토너','에멀전','착색앰플','착색 앰플','양배추크림','양배추 크림','아기살성크림','아기 살성크림','오일미스트','토너','앰플','유선크림','베이비크림','베이비 크림','세트'];
  const hasProductKw = productKeywords.some(k => n.includes(k));
  if (!hasProductKw && n.length <= 12) return n;
  return '기본';
}

// 옵션 종류 추출: 'single'(단품) | 'bundle'(다량: 1+1, 3+1, 3+3 등 모든 X+Y 묶음)
// 시트의 option_name 컬럼이 적재되면 그것 사용. 현재는 productName 휴리스틱
function optionTypeOf(p) {
  // 1순위: 시트의 option_name 컬럼 (적재 후)
  if (p.option_name || p.optionName) {
    const opt = (p.option_name || p.optionName).toString();
    if (/\d+\s*\+\s*\d+/.test(opt)) return 'bundle';   // X+Y 모두 다량
    if (/단품|single|^1\s*개$/i.test(opt)) return 'single';
    return 'single'; // 기본 단품
  }
  // 2순위: productName 휴리스틱 (옛 데이터)
  const n = p.productName || '';
  if (/\d+\s*\+\s*\d+/.test(n)) return 'bundle';  // 1+1, 3+1, 3+3, 5+1 등
  return 'single';
}

// 옵션 필터 통과 여부
function passesOptionFilter(p) {
  if (currentOption === 'all') return true;
  return optionTypeOf(p) === currentOption;
}

// 매트릭스/드롭다운 그룹 키 — 항상 displayName (옵션은 별도 필터)
function keyOf(p) {
  return dispOf(p);
}

// 제품 드롭다운 — displayName 단위 (현재 선택 유지)
function populateProductSelect() {
  const sel = document.getElementById('productSelect');
  if (!sel) return;
  const prevValue = sel.value || currentProduct;
  buildPidToDisp();
  const groups = {};
  (SHEET.products || []).forEach(p => {
    if (!passesOptionFilter(p)) return;
    const key = keyOf(p);
    if (!groups[key]) groups[key] = 0;
    groups[key] += p.amount || 0;
  });
  const sorted = Object.entries(groups).sort((a, b) => b[1] - a[1]);
  sel.innerHTML = `<option value="">전체 제품 (매출 합산)</option>`
    + sorted.map(([key]) => `<option value="${key}">${key}</option>`).join('');
  // 이전 선택 복원
  if (prevValue && [...sel.options].some(o => o.value === prevValue)) {
    sel.value = prevValue;
  }
}

// 기본 기간: 종료일 = 어제 (오늘은 아직 적재 X) / 시작일 = 14일 전
function setDefaultRange() {
  if (!SHEET.daily.length) return;
  const fmt = (dt) => dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  const startDt = new Date(yesterday); startDt.setDate(startDt.getDate() - 13);
  currentStart = fmt(startDt);
  currentEnd = fmt(yesterday);
  document.getElementById('startDate').value = currentStart;
  document.getElementById('endDate').value = currentEnd;
  // picker 선택 가능 범위 — 시트 first ~ 어제 (오늘은 클릭 못하게)
  const first = SHEET.daily[0].date;
  document.getElementById('startDate').min = first;
  document.getElementById('startDate').max = currentEnd;
  document.getElementById('endDate').min = first;
  document.getElementById('endDate').max = currentEnd;
}

// localStorage 캐시 (5분 TTL) — 두번째 방문부턴 즉시 표시
const CACHE_KEY = 'momsolve_dashboard_v1';
const CACHE_TTL_MS = 5 * 60 * 1000;
const LAST_REFRESH_KEY = 'momsolve_last_refresh';

function formatTs(date) {
  const pad = (n) => String(n).padStart(2, '0');
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
}
function setLastRefreshDisplay() {
  const el = document.getElementById('lastRefresh');
  if (!el) return;
  const iso = localStorage.getItem(LAST_REFRESH_KEY);
  if (!iso) { el.textContent = '마지막 갱신: —'; return; }
  el.textContent = '마지막 갱신: ' + formatTs(new Date(iso));
}
function markRefreshed() {
  localStorage.setItem(LAST_REFRESH_KEY, new Date().toISOString());
  setLastRefreshDisplay();
}

function readCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj.ts || Date.now() - obj.ts > CACHE_TTL_MS) return null;
    return obj.data;
  } catch (e) { return null; }
}
function writeCache(data) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
  } catch (e) { /* quota 초과 등 무시 */ }
}

function applyData(data, fromCache) {
  SHEET.daily = data.daily || [];
  SHEET.channelCounts = data.channelCounts || [];  // v4 배포 전엔 빈 배열
  SHEET.products = data.products || [];
  setDefaultRange();
  rerenderAll();
  console.log((fromCache ? '⚡ 캐시 ' : '✅ 시트 ') + '로드 완료:', SHEET.daily.length, '일',
    SHEET.channelCounts.length ? `(채널별 주문건수 ${SHEET.channelCounts.length}일)` : '(주문건수는 quantity 근사)');
}

async function fetchFromSheet() {
  try {
    // 캐시 우회를 위해 timestamp 쿼리 추가
    const res = await fetch(WEBAPP_URL + '?action=getDashboardData&_=' + Date.now());
    const data = await res.json();
    if (!data.ok || !Array.isArray(data.daily)) {
      document.getElementById('headerDate').textContent = '시트 응답 형식 오류';
      console.warn('시트 응답:', data);
      return;
    }
    writeCache(data);
    applyData(data, false);
    markRefreshed();
  } catch (e) {
    if (!SHEET.daily.length) {
      document.getElementById('headerDate').textContent = '시트 로딩 실패 — F12 콘솔 확인';
    }
    console.error('시트 로드 실패:', e);
  }
}

// 수동 갱신 — 캐시 무시하고 시트 다시 fetch
async function manualRefresh() {
  const btn = document.getElementById('refreshBtn');
  const lastEl = document.getElementById('lastRefresh');
  if (btn) { btn.disabled = true; btn.textContent = '🔄 갱신 중...'; }
  if (lastEl) lastEl.textContent = '갱신 중...';
  localStorage.removeItem(CACHE_KEY); // 캐시 비우기
  try {
    await fetchFromSheet();
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🔄 수동 갱신'; }
  }
}

async function loadRealData() {
  // 1) 캐시 있으면 즉시 렌더 (즉각 반응) + 백그라운드에서 최신 가져오기
  const cached = readCache();
  if (cached) {
    applyData(cached, true);
  } else {
    document.getElementById('headerDate').textContent = '시트 데이터 로딩 중... (첫 방문 5~7초)';
  }
  // 2) 백그라운드에서 최신 가져와 화면 갱신
  await fetchFromSheet();
}

// 필터 변경 시 재렌더
document.getElementById('startDate').addEventListener('change', (e) => {
  currentStart = e.target.value;
  // 시작일을 종료일보다 늦게 고르면 종료일을 시작일에 맞춤 (역전 방지)
  if (currentEnd && currentStart > currentEnd) {
    currentEnd = currentStart;
    document.getElementById('endDate').value = currentEnd;
  }
  rerenderAll();
});
document.getElementById('endDate').addEventListener('change', (e) => {
  currentEnd = e.target.value;
  // 종료일을 시작일보다 이르게 고르면 시작일을 종료일에 맞춤 (역전 방지)
  if (currentStart && currentEnd < currentStart) {
    currentStart = currentEnd;
    document.getElementById('startDate').value = currentStart;
  }
  rerenderAll();
});
// 제품·옵션 드롭다운은 다음 페이지(제품군별 매출)에서 사용 예정
// 빠른 기간 버튼 — 모두 picker 의 날짜를 수정 + 재렌더 (어제 기준)
function applyQuickRange(range) {
  const fmt = (dt) => dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  let s, e;
  if (range === 'yesterday') {
    s = e = fmt(yesterday);
  } else if (range === '7' || range === '14') {
    const n = parseInt(range, 10);
    const startDt = new Date(yesterday);
    startDt.setDate(startDt.getDate() - (n - 1));
    s = fmt(startDt); e = fmt(yesterday);
  } else if (range === 'month') {
    s = fmt(new Date(today.getFullYear(), today.getMonth(), 1));
    e = fmt(yesterday);  // 이번달 1일~어제
    if (s > e) s = e;     // 이번달 1일이 어제보다 늦으면 (월 첫날) 한 점
  } else if (range === 'lastmonth') {
    s = fmt(new Date(today.getFullYear(), today.getMonth() - 1, 1));
    e = fmt(new Date(today.getFullYear(), today.getMonth(), 0));
  }
  currentStart = s;
  currentEnd = e;
  document.getElementById('startDate').value = s;
  document.getElementById('endDate').value = e;
  rerenderAll();
}
document.querySelectorAll('.quick-btn').forEach(btn => {
  btn.addEventListener('click', () => applyQuickRange(btn.dataset.range));
});

// === 제품별 일별 추이 선그래프 (채널 페이지 trendChart 와 동일 스타일) ===
let selectedProducts = new Set();
// 제품 표시명: 브랜드(라인) 빼고 '_' 뒷부분만 (예: 튼사렌_살성크림 → 살성크림)
const shortName = (n) => { const i = String(n).indexOf('_'); return i >= 0 ? n.slice(i + 1) : n; };
const PRODUCT_PALETTE =['#ffb6c1','#34c759','#ff9500','#ff3b30','#af52de','#007aff','#5ac8fa','#5856d6','#ffd60a','#30d158','#bf5af2','#64d2ff','#ff6482','#a2845e','#ac8e68','#ffd426'];
const _productColorMap = {};
let _productColorIdx = 0;
function colorForProduct(name) {
  if (!(name in _productColorMap)) { _productColorMap[name] = PRODUCT_PALETTE[_productColorIdx % PRODUCT_PALETTE.length]; _productColorIdx++; }
  return _productColorMap[name];
}
const productTrendChart = new Chart(document.getElementById('productTrendChart'), {
  type: 'line',
  data: { labels: [], datasets: [] },
  options: {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: 'rgba(31,41,51,0.95)', cornerRadius: 8, padding: 10,
        callbacks: { label: (ctx) => `  ${ctx.dataset.label}: ${fmtWon(ctx.parsed.y)}` }
      }
    },
    scales: {
      x: { grid: { display: false }, ticks: { color: '#5f6b6d', font: { size: 11 } } },
      y: {
        grid: { color: 'rgba(31,41,51,0.07)', drawBorder: false },
        ticks: { color: '#5f6b6d', font: { size: 11 }, callback: (v) => fmtWon(v) }
      }
    }
  }
});
// 체크박스 토글 → 선택 갱신 후 재렌더
document.getElementById('productCheckboxRow').addEventListener('change', (e) => {
  const cb = e.target;
  if (cb && cb.matches && cb.matches('input[type=checkbox]')) {
    const name = cb.dataset.name;
    if (cb.checked) selectedProducts.add(name); else selectedProducts.delete(name);
    rerenderAll();
  }
});

// Chart 객체 생성된 후에 호출 (이 스크립트 끝에 있어서 OK)
loadRealData();
</script>
