<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>맘솔브 제품별 매출</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* Apple dark-mode tile palette (per provided design spec) */
    --bg: #1d1d1f;                 /* ink — deepest canvas */
    --bg-sidebar: #252527;         /* surface-tile-3 */
    --bg-main: #1d1d1f;
    --bg-soft: #2a2a2c;            /* surface-tile-2 — KPI / soft chips */
    --bg-card: #272729;            /* surface-tile-1 — cards */
    --text: #ffffff;               /* body-on-dark */
    --text-soft: #cccccc;          /* body-muted */
    --text-faint: #7a7a7a;         /* ink-muted-48 */
    --line: rgba(255,255,255,0.10);
    --line-soft: rgba(255,255,255,0.06);
    --blue: #2997ff;               /* primary-on-dark (Sky Link Blue) */
    --blue-soft: rgba(41,151,255,0.16);
    --hover: rgba(255,255,255,0.06);
    --selected: rgba(41,151,255,0.18);
    --apple-blue: #2997ff;
    --apple-green: #34c759;
    --apple-orange: #ff9500;
    --apple-red: #ff3b30;
    --apple-purple: #af52de;
    --apple-pink: #ff2d92;
    --apple-teal: #5ac8fa;
    --apple-indigo: #5856d6;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', 'Apple SD Gothic Neo', '맑은 고딕', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
  }
  .app { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }

  /* ========== 노션 스타일 좌측 사이드바 ========== */
  .sidebar {
    background: var(--bg-sidebar);
    border-right: 1px solid var(--line);
    padding: 12px 8px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .workspace {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; margin-bottom: 14px;
    border-radius: 4px; cursor: pointer;
  }
  .workspace:hover { background: var(--hover); }
  .ws-icon {
    width: 22px; height: 22px; border-radius: 5px;
    background: linear-gradient(135deg, #ff9a56, #ff6b9d);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 12px; font-weight: 700;
  }
  .ws-name { font-size: 13.5px; font-weight: 600; flex: 1; }
  .ws-caret { color: var(--text-faint); font-size: 10px; }

  .nav-section { margin-bottom: 16px; }
  .nav-section-title {
    font-size: 11.5px; color: var(--text-faint); font-weight: 500;
    padding: 4px 10px; margin-bottom: 2px;
    text-transform: none;
  }
  .nav-item {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 8px; margin: 1px 0;
    border-radius: 4px; cursor: pointer;
    font-size: 14px; color: var(--text);
    line-height: 1.3; user-select: none;
  }
  .nav-item:hover { background: var(--hover); }
  .nav-item.active { background: var(--selected); font-weight: 600; }
  .nav-item .caret {
    color: var(--text-faint); width: 14px; text-align: center;
    font-size: 10px; opacity: 0; transition: opacity 0.1s;
  }
  .nav-item:hover .caret { opacity: 1; }
  .nav-item .icon {
    width: 18px; text-align: center; font-size: 15px;
    color: var(--text-soft); flex-shrink: 0;
  }
  .nav-item .label { flex: 1; }
  .nav-item .plus {
    color: var(--text-faint); font-size: 14px;
    width: 18px; text-align: center; opacity: 0;
  }
  .nav-item:hover .plus { opacity: 1; }
  .nav-children { margin-left: 18px; }

  /* ========== 메인 ========== */
  .main { background: var(--bg-main); }

  /* 상단 필터 바 (체크박스 영역) */
  .filter-bar {
    padding: 18px 36px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-main);
    position: sticky; top: 0; z-index: 10;
  }
  .filter-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .breadcrumb { font-size: 12.5px; color: var(--text-soft); }
  .breadcrumb .sep { margin: 0 6px; color: var(--text-faint); }
  .page-title { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 10px; }
  .page-emoji { font-size: 28px; margin-right: 6px; }

  .filter-row {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .filter-group {
    display: flex; align-items: center; gap: 6px;
  }
  .filter-label {
    font-size: 11.5px; color: var(--text-faint); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em;
    margin-right: 4px;
  }

  /* 애플 스타일 체크박스 칩 (dark) */
  .chip {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 12px; border-radius: 999px;
    background: rgba(255,255,255,0.06); cursor: pointer; user-select: none;
    font-size: 12.5px; font-weight: 500;
    transition: all 0.15s;
    border: 1px solid transparent;
    color: var(--text);
  }
  .chip input { display: none; }
  .chip .swatch { width: 8px; height: 8px; border-radius: 50%; }
  .chip.on {
    background: var(--bg-card); border-color: var(--line);
  }
  .chip.off { opacity: 0.4; }
  .chip.off .swatch { background: #555 !important; }

  .filter-select {
    padding: 7px 30px 7px 12px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--bg-card);
    font-size: 13px; color: var(--text);
    font-family: inherit; cursor: pointer;
    -webkit-appearance: none; appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%23cccccc' d='M6 8L0 0h12z'/></svg>");
    background-repeat: no-repeat; background-position: right 10px center;
  }
  /* 빠른 기간 버튼 — 셀렉트와 같은 톤이지만 화살표 X + 라운드 + 충분한 padding */
  button.quick-btn {
    padding: 7px 14px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--bg-card);
    font-size: 12.5px; font-weight: 500; color: var(--text);
    font-family: inherit; cursor: pointer;
    background-image: none;
    line-height: 1.4;
    letter-spacing: 0;
    white-space: nowrap;
    transition: background 0.12s, border-color 0.12s;
  }
  button.quick-btn:hover { background: var(--hover); border-color: rgba(255,255,255,0.18); }
  button.quick-btn:active { background: var(--selected); }

  /* 날짜 picker — native 화살표 사용, custom 화살표 제거, padding 충분히 */
  input[type="date"].filter-select {
    padding: 7px 12px;
    background-image: none;
    min-width: 142px;
    font-variant-numeric: tabular-nums;
    color-scheme: dark;
  }
  input[type="date"].filter-select::-webkit-calendar-picker-indicator {
    filter: invert(0.6);
    cursor: pointer;
    margin-left: 4px;
  }

  /* 컨텐츠 영역 */
  .content { padding: 24px 36px 60px; }

  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
  .kpi {
    background: var(--bg-soft); border-radius: 12px; padding: 18px 20px;
  }
  .kpi .l { font-size: 12px; color: var(--text-soft); margin-bottom: 6px; }
  .kpi .l .avg { font-size: 11px; color: var(--text-faint); margin-left: 4px; }
  .kpi .v { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
  .kpi .d { font-size: 12px; margin-top: 5px; font-weight: 500; }
  .d.up { color: var(--apple-green); }
  .d.down { color: var(--apple-red); }

  .card {
    background: var(--bg-card); border: 1px solid var(--line);
    border-radius: 12px; padding: 22px;
  }
  .card-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .card-head h3 { font-size: 15px; font-weight: 600; }
  .card-head .sub { color: var(--text-soft); font-size: 12px; margin-top: 2px; }

  .toggles { display: flex; flex-wrap: wrap; gap: 6px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 14px; }
  .row-trend { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; margin-bottom: 14px; }
  @media (max-width: 1280px) { .row-trend { grid-template-columns: 1fr; } }
  .chart-wrap { height: 280px; position: relative; }
  /* 제품별 매출 표 */
  .ptable { border-collapse: collapse; width: 100%; font-size: 12.5px; }
  .ptable th, .ptable td { padding: 7px 9px; border-bottom: 1px solid var(--line-soft); text-align: right; white-space: nowrap; }
  .ptable th { background: var(--bg-soft); color: var(--text-soft); font-weight: 600; font-size: 11.5px; position: sticky; top: 0; z-index: 1; }
  .ptable th:first-child, .ptable td:first-child { text-align: left; position: sticky; left: 0; background: var(--bg); z-index: 2; }
  .ptable th:first-child { z-index: 3; background: var(--bg-soft); }
  .ptable tr:hover td { background: var(--hover); }
  .ptable tr.total-row td { font-weight: 700; background: var(--bg-soft); border-top: 2px solid var(--line); }
  .ptable td.total-col { font-weight: 700; color: var(--text); background: var(--bg-soft); }
  .ptable .ch-tag { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .rank-row {
    display: grid; grid-template-columns: 70px 1fr 80px;
    align-items: center; gap: 8px; font-size: 12px;
  }
  .rank-bar-wrap { height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
  .rank-bar { height: 100%; border-radius: 4px; }
  .rank-amt { text-align: right; font-variant-numeric: tabular-nums; color: var(--text-soft); }

  table.matrix { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.matrix th, table.matrix td {
    padding: 9px 10px; border-bottom: 1px solid var(--line-soft); text-align: right;
    font-variant-numeric: tabular-nums;
  }
  table.matrix th { color: var(--text-soft); font-weight: 500; font-size: 11.5px; }
  table.matrix td:first-child, table.matrix th:first-child { text-align: left; font-weight: 600; }
  .heat-1 { background: rgba(52,199,89,0.12); }
  .heat-2 { background: rgba(52,199,89,0.22); }
  .heat-3 { background: rgba(52,199,89,0.38); }
  .heat-4 { background: rgba(52,199,89,0.55); font-weight: 600; color: #fff; }
</style>
</head>
<body>

<div class="app">

  <!-- ========== 좌측: 노션 스타일 네비 (체크박스 X) ========== -->
  <aside class="sidebar">
    <div class="workspace">
      <div class="ws-icon">맘</div>
      <div class="ws-name">맘솔브 운영 대시보드</div>
      <span class="ws-caret">▼</span>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">대시보드</div>
      <a class="nav-item" href="index.html" style="text-decoration:none; color:inherit;">
        <span class="caret">▸</span>
        <span class="icon">📊</span>

        <span class="caret">▾</span>
        <span class="icon">📦</span>

      </a>
      <div class="nav-item" style="opacity: 0.5; cursor: not-allowed;">
        <span class="caret">▸</span>
        <span class="icon">📢</span>
        <span class="label">마케팅</span>
        <span style="font-size:10px; color:var(--text-faint); margin-left:auto;">예정</span>
      </div>
      <div class="nav-item" style="opacity: 0.5; cursor: not-allowed;">
        <span class="caret">▸</span>
        <span class="icon">🎁</span>
        <span class="label">쿠폰·프로모션</span>
        <span style="font-size:10px; color:var(--text-faint); margin-left:auto;">예정</span>

  </aside>

  <!-- ========== 메인 ========== -->
  <main class="main">

    <!-- 상단: 3단 구조 = ① 필터링 → ② 체크박스 → (그 밑 결과) -->
    <div class="filter-bar">
      <!-- 미니 breadcrumb (작게) -->
      <div class="filter-top" style="margin-bottom: 12px;">
        <div class="breadcrumb">
          📦 <strong style="color: var(--text);">제품별 매출</strong>
          <span class="sep">·</span> <span id="headerDate">로딩 중...</span> · 매일 05:00 자동 갱신
        </div>
      </div>

      <!-- ① 필터링 -->
      <div class="filter-row" style="margin-bottom: 10px;">
        <span class="filter-label">① 기간</span>
        <div class="filter-group">
          <input type="date" class="filter-select" id="startDate">
          <span style="color: var(--text-faint); font-size: 13px;">~</span>

        </div>
        <div class="filter-group" style="margin-left: 8px; gap: 6px;">
          <button class="quick-btn" data-range="yesterday" type="button">어제</button>
          <button class="quick-btn" data-range="7" type="button">최근 7일</button>

      <!-- ② 체크박스 (채널) -->

      <!-- 옵션 그룹 체크박스 (단품 / 3개 묶음) -->

        <span style="font-size: 12px; color: var(--text-soft); font-weight: 600;">옵션 유형</span>

          </div>

<script>
// 채널 정의 (시트 키와 1:1) — amount 는 시트 로드 후 채워짐
const channelKeys = ['cafe24','naver','coupang','kakao','mamitalk','ezwel','ezwel_voucher','babybilly'];
const channels = [
  { key: 'cafe24',        name: '카페24',          aliases: ['자사몰','카페24','맘솔브'],  color: '#ffb6c1', amount: 0, count: 0, selected: false},
  { key: 'naver',         name: '네이버',          aliases: ['네이버'],                   color: '#34c759', amount: 0, count: 0, selected: false},
  { key: 'coupang',       name: '쿠팡',            aliases: ['쿠팡'],                     color: '#ff9500', amount: 0, count: 0, selected: false},
  { key: 'kakao',         name: '카카오선물하기',  aliases: ['카카오','카카오선물하기'],  color: '#ff3b30', amount: 0, count: 0, selected: false},
  { key: 'mamitalk',      name: '마미톡',          aliases: ['마미톡'],                   color: '#af52de', amount: 0, count: 0, selected: false},
  { key: 'ezwel',         name: '이지웰',          aliases: ['이지웰'],                   color: '#007aff', amount: 0, count: 0, selected: false},
  { key: 'ezwel_voucher', name: '이지웰바우처',    aliases: ['이지웰바우처'],             color: '#5ac8fa', amount: 0, count: 0, selected: false},
  { key: 'babybilly',     name: '베이비빌리',      aliases: ['베이비빌리'],               color: '#5856d6', amount: 0, count: 0, selected: false},
];

// products.channel 값 → channel.key 매핑
function productChannelToKey(channelName) {
  if (!channelName) return null;
  for (const c of channels) {
    if (c.aliases.includes(channelName)) return c.key;
  }
  return null;
}

// 활성 채널 key 배열 (0개 선택 = 전체, 1개 이상 = 그것만)
function activeChannelKeys() {
  const selected = channels.filter(c => c.selected).map(c => c.key);
  return selected.length === 0 ? channels.map(c => c.key) : selected;
}
// 활성 채널 key Set
function activeChannelKeySet() { return new Set(activeChannelKeys()); }

// 선차트 카드 sub 텍스트용
function formatActiveChannelsText() {
  const selected = channels.filter(c => c.selected);
  if (selected.length === 0 || selected.length === channels.length) return '전체 채널';
  return selected.map(c => c.name).join(', ');
}
function formatDateRangeText() {
  if (!currentStart || !currentEnd) return '전체 기간';
  const fmt = (s) => { const dt = new Date(s); return `${dt.getMonth()+1}/${dt.getDate()}`; };
  return currentStart === currentEnd ? fmt(currentStart) : `${fmt(currentStart)} ~ ${fmt(currentEnd)}`;
}

// 시트 데이터 캐시 (loadRealData 가 채움)
// channelCounts 는 v4 Apps Script 가 제공 (배포 전엔 빈 배열 → products.quantity 로 fallback)
let SHEET = { daily: [], channelCounts: [], products: [] };
// 현재 필터 상태 (날짜 picker 기반)
let currentStart = '';  // ISO 'YYYY-MM-DD'
let currentEnd = '';
let currentProduct = '';
let currentOption = 'all';   // 'all' | 'single' | 'bundle'

// 한글 단위 포맷: 1억원 / 1,250만원 / 8,500원 (차트 콜백에서 미리 참조 — 차트 정의 위에 둠)
const fmtWon = (n) => {
  n = Math.round(Number(n) || 0);
  if (n === 0) return '0원';
  const neg = n < 0;
  n = Math.abs(n);
  let out;
  if (n >= 100000000) {
    const eok = n / 100000000;
    out = (Math.round(eok * 10) / 10).toString().replace(/\.0$/, '') + '억원';
  } else if (n >= 10000) {
    out = Math.round(n / 10000).toLocaleString() + '만원';
  } else {
    out = n.toLocaleString() + '원';
  }
  return neg ? '-' + out : out;
};
const fmtPct = (n) => (n >= 0 ? '▲ ' : '▼ ') + Math.abs(n).toFixed(1) + '%';
const fmtDelta = (n) => (n >= 0 ? '▲ +' : '▼ ') + Math.abs(n).toLocaleString();

// 라인 아래 그라데이션 페이드 (color 상단 → 투명 하단)
function makeGradient(color) {
  return (ctx) => {
    const chart = ctx.chart;
    const area = chart.chartArea;
    if (!area) return color + '20';
    const g = chart.ctx.createLinearGradient(0, area.top, 0, area.bottom);
    g.addColorStop(0, color + '55');
    g.addColorStop(1, color + '00');
    return g;
  };
}

// (이 페이지는 차트 없음 — 표만)

function makeChips(containerId, items, onToggle) {
  const box = document.getElementById(containerId);
  items.forEach((item, idx) => {
    const wrap = document.createElement('label');
    wrap.className = 'chip off';
    wrap.innerHTML = `<input type="checkbox"><span class="swatch" style="background:${item.color}"></span>${item.name}`;
    wrap.querySelector('input').addEventListener('change', (e) => {
      wrap.classList.toggle('on', e.target.checked);
      wrap.classList.toggle('off', !e.target.checked);
      onToggle(idx, e.target.checked);
    });
    box.appendChild(wrap);
  });
}

// 옵션 그룹 필터 (둘 다 체크 시 합산)
let optionSingleOn = true;
let optionTripleOn = true;

// 옵션 그룹 분류: 'triple' (3+X 묶음) / 'single' (1개·1+1·기타)
function optionGroupOf(p) {
  const opt = String(p.option_name || '').trim();
  const n = String(p.productName || '').trim();
  const candidate = opt || n;
  const m = candidate.match(/(\d+)\s*\+\s*(\d+)/);
  if (m && parseInt(m[1], 10) === 3) return 'triple';
  return 'single';
}

document.getElementById('optSingle').addEventListener('change', (e) => {

  rerenderAll();
});
document.getElementById('optTriple').addEventListener('change', (e) => {
  optionTripleOn = e.target.checked;
  rerenderAll();
});

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// 기간(start~end)에 따른 daily 행 필터
function pickDailyByRange(start, end) {
  if (!SHEET.daily.length) return [];
  if (!start || !end) return SHEET.daily.slice(-14);
  return SHEET.daily.filter(d => d.date >= start && d.date <= end);
}

// 옵션 필터 적용된 날짜별·채널별 매출 (products 시트 기반)
// 'all' 일 때는 daily 시트 직접 사용 (빠름)
function getValueForDayChannel(date, channelKey) {
  if (currentOption === 'all') {
    const row = SHEET.daily.find(d => d.date === date);
    return row ? (row[channelKey] || 0) : 0;
  }
  return (SHEET.products || [])
    .filter(p =>
      p.date === date
      && productChannelToKey(p.channel) === channelKey
      && passesOptionFilter(p))
    .reduce((sum, p) => sum + (p.amount || 0), 0);
}

// 날짜·채널·옵션·제품 필터 통과한 주문 건수
// 옵션 필터 없을 땐 v4 의 channelCounts 시트 사용 (진짜 주문건수)
// 옵션 필터 있을 땐 products.quantity 합산 (옵션별 분해 가능, item count 근사치)
function getCountForDayChannel(date, channelKey) {
  if (currentOption === 'all' && SHEET.channelCounts && SHEET.channelCounts.length) {
    const row = SHEET.channelCounts.find(c => c.date === date);
    if (row) return Number(row[channelKey]) || 0;
  }
  return (SHEET.products || [])
    .filter(p =>
      p.date === date
      && productChannelToKey(p.channel) === channelKey
      && passesOptionFilter(p))
    .reduce((sum, p) => sum + (p.quantity || 0), 0);
}

// 제품별 매출 view — 표 두 개 (날짜×상품 매트릭스 + 합계)
function rerenderAll() {
  if (!SHEET.daily.length) return;

  const last = SHEET.daily[SHEET.daily.length - 1];
  document.getElementById('headerDate').textContent = last.date;

  const activeKeys = activeChannelKeys();
  const activeKeySet = new Set(activeKeys);
  const periodDaily = pickDailyByRange(currentStart, currentEnd);
  const dateSet = new Set(periodDaily.map(d => d.date));

  // products 필터: 기간 내 + 활성 채널 + 옵션 그룹
  const filtered = (SHEET.products || []).filter(p => {
    if (!dateSet.has(p.date)) return false;
    const chKey = productChannelToKey(p.channel);
    if (!activeKeySet.has(chKey)) return false;
    const group = optionGroupOf(p);
    if (group === 'single' && !optionSingleOn) return false;
    if (group === 'triple' && !optionTripleOn) return false;
    return true;
  });

  // ===== 표 1: 날짜 × 상품 Top 10 매트릭스 (히트맵 적용) =====
  const productTotals = {};
  const cellMap = {};
  filtered.forEach(p => {
    const name = dispOf(p);
    productTotals[name] = (productTotals[name] || 0) + (p.amount || 0);
    if (!cellMap[p.date]) cellMap[p.date] = {};
    cellMap[p.date][name] = (cellMap[p.date][name] || 0) + (p.amount || 0);
  });
  const topProducts = Object.entries(productTotals)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10)
    .map(([name, total]) => ({ name, total }));

  // 히트맵 색상 계산: 셀 매출 / 최대 셀 매출 → 초록 알파
  // 낮은 값은 거의 안 보이게(어둡게), 높은 값은 진한 초록(밝게). sqrt 로 변별력 강화
  let maxCellAmt = 0;
  Object.values(cellMap).forEach(row => Object.values(row).forEach(v => { if (v > maxCellAmt) maxCellAmt = v; }));
  const cellColor = (amt) => {
    if (amt <= 0 || maxCellAmt <= 0) return '';
    const ratio = Math.sqrt(amt / maxCellAmt);  // 0~1
    const alpha = 0.06 + ratio * 0.55;          // 0.06(어두움) ~ 0.61(진한 초록)
    return `background: rgba(52,199,89,${alpha.toFixed(2)});`;
  };

  const wrap = document.getElementById('productTableWrap');
  if (topProducts.length === 0) {
    wrap.innerHTML = '<div style="color:var(--text-faint); font-size:13px; padding: 14px;">선택 기간·채널·옵션 조건에 매출 데이터 없음</div>';
  } else {
    let html = '<table class="ptable"><thead><tr><th>날짜</th>';
    topProducts.forEach(p => html += `<th>${escapeHtml(p.name)}</th>`);
    html += '<th class="total-col">합계</th></tr></thead><tbody>';

    const sortedDates = [...dateSet].sort((a, b) => b.localeCompare(a));
    sortedDates.forEach(d => {
      html += `<tr><td>${d}</td>`;
      let rowTotal = 0;
      topProducts.forEach(p => {
        const amt = (cellMap[d] && cellMap[d][p.name]) || 0;
        rowTotal += amt;
        const style = cellColor(amt);
        html += `<td style="${style}">${amt > 0 ? fmtWon(amt) : '—'}</td>`;
      });
      html += `<td class="total-col">${rowTotal > 0 ? fmtWon(rowTotal) : '—'}</td></tr>`;
    });

    html += '<tr class="total-row"><td>합계</td>';
    let grandTotal = 0;
    topProducts.forEach(p => {
      html += `<td>${fmtWon(p.total)}</td>`;
      grandTotal += p.total;
    });
    html += `<td class="total-col">${fmtWon(grandTotal)}</td></tr>`;
    html += '</tbody></table>';
    wrap.innerHTML = html;
  }

  // ===== 표 2: 상품(displayName) + 채널 합계 =====
  const summary = {};
  filtered.forEach(p => {
    const name = dispOf(p);
    const key = `${name}__${p.channel}`;
    if (!summary[key]) summary[key] = {
      name,
      channel: p.channel || '',
      quantity: 0, amount: 0
    };
    summary[key].quantity += (p.quantity || 0);
    summary[key].amount += (p.amount || 0);
  });
  const sumRows = Object.values(summary).sort((a, b) => b.amount - a.amount);

  const wrap2 = document.getElementById('productSummaryWrap');
  if (sumRows.length === 0) {
    wrap2.innerHTML = '<div style="color:var(--text-faint); font-size:13px; padding: 14px;">선택 기간·채널·옵션 조건에 매출 데이터 없음</div>';
  } else {
    let html2 = '<table class="ptable"><thead><tr><th>상품명</th><th>채널</th><th>수량</th><th>매출</th></tr></thead><tbody>';
    let totalQty = 0, totalAmt = 0;
    sumRows.forEach(r => {
      totalQty += r.quantity; totalAmt += r.amount;
      html2 += `<tr><td>${escapeHtml(r.name)}</td><td>${escapeHtml(r.channel)}</td><td>${r.quantity.toLocaleString()}</td><td>${fmtWon(r.amount)}</td></tr>`;
    });
    html2 += `<tr class="total-row"><td>합계</td><td></td><td>${totalQty.toLocaleString()}</td><td>${fmtWon(totalAmt)}</td></tr>`;
    html2 += '</tbody></table>';
    wrap2.innerHTML = html2;
  }

  // sub 텍스트
  const dateText = formatDateRangeText();
  const chanText = formatActiveChannelsText();
  const optText = (optionSingleOn && optionTripleOn) ? '단품+3개 합산'
                : optionSingleOn ? '단품(1개·1+1)'
                : optionTripleOn ? '3개 묶음(3+1·3+3)'
                : '옵션 미선택';
  const sub = document.getElementById('productTableSub');
  if (sub) sub.textContent = `${dateText} · ${chanText} · ${optText} · 행=날짜, 열=상품 Top 10`;
}

// 맘솔브 라인업 매핑 — productName 에서 라인_제품군 추출
function makeDisplayName(productName) {
  if (!productName) return '(이름없음)';
  const n = productName;
  // 1. 임신 X주차 세트
  const setMatch = n.match(/임신\s*(\d+)\s*주차/);
  if (setMatch) return `임신${setMatch[1]}주차_세트`;
  // 2. 브랜드 라인
  const lines = ['튼사렌', '퓨어렌', '흰사렌', '몸사렌', '베베솔브'];
  let line = '';
  for (const l of lines) { if (n.includes(l)) { line = l; break; } }
  // 3. 제품 키워드 (긴 키워드 먼저)
  const products = [
    { kw: '아기 살성크림', d: '아기살성크림' },
    { kw: '아기살성크림', d: '아기살성크림' },
    { kw: '베이비 크림', d: '아기살성크림' },
    { kw: '베이비크림', d: '아기살성크림' },
    { kw: '바디 오일미스트', d: '오일미스트' },
    { kw: '바디오일미스트', d: '오일미스트' },
    { kw: '오일미스트', d: '오일미스트' },
    { kw: '살성크림', d: '살성크림' },
    { kw: '살성오일', d: '살성오일' },
    { kw: '수분크림', d: '수분크림' },
    { kw: '스킨 토너', d: '스킨토너' },
    { kw: '스킨토너', d: '스킨토너' },
    { kw: '에멀전', d: '에멀전' },
    { kw: '착색 앰플', d: '착색앰플' },
    { kw: '착색앰플', d: '착색앰플' },
    { kw: '앰플', d: '착색앰플' },
    { kw: '양배추 크림', d: '양배추크림' },
    { kw: '양배추크림', d: '양배추크림' },
    { kw: '유선크림', d: '양배추크림' },
    { kw: '토너', d: '토너' },
  ];
  let product = '';
  for (const { kw, d } of products) { if (n.includes(kw)) { product = d; break; } }
  if (line && product) return `${line}_${product}`;
  if (product) return product;
  if (line) return line;
  return n.length > 24 ? n.slice(0, 24) + '…' : n;
}

// productId -> displayName 매핑 (같은 pid 안에서 가장 긴 productName 의 displayName 사용)
let _pidToDispCache = null;
function buildPidToDisp() {
  const pidNames = {};
  (SHEET.products || []).forEach(p => {
    const pid = String(p.productId || p.productName || 'unknown');
    if (!pidNames[pid]) pidNames[pid] = [];
    if (p.productName) pidNames[pid].push(p.productName);
  });
  const map = {};
  for (const [pid, names] of Object.entries(pidNames)) {
    const longest = [...new Set(names)].sort((a, b) => b.length - a.length)[0] || pid;
    map[pid] = makeDisplayName(longest);
  }
  _pidToDispCache = map;
  return map;
}
function dispOf(p) {
  if (!_pidToDispCache) buildPidToDisp();
  const pid = String(p.productId || p.productName || 'unknown');
  return _pidToDispCache[pid] || makeDisplayName(p.productName);
}

// 옵션값 추출: productName 끝의 용량(Xml/Xg/X개) 또는 프로모션(X+X) 또는 짧은 옵션값 단독 행
function extractOption(productName) {
  if (!productName) return '';
  const n = productName.trim();
  // 1. 풀네임 끝의 용량·프로모션
  const m = n.match(/(\d+\s*(?:ml|ML|g|G|개|kg|KG))\b/);
  if (m) return m[1].replace(/\s/g, '').toLowerCase();
  const promo = n.match(/(\d+\+\d+)/);
  if (promo) return promo[1];
  // 2. 짧은 옵션값 단독 행 (네이버 케이스: '100ml', '30ml' 같은 행)
  const productKeywords = ['살성크림','살성오일','수분크림','스킨토너','스킨 토너','에멀전','착색앰플','착색 앰플','양배추크림','양배추 크림','아기살성크림','아기 살성크림','오일미스트','토너','앰플','유선크림','베이비크림','베이비 크림','세트'];
  const hasProductKw = productKeywords.some(k => n.includes(k));
  if (!hasProductKw && n.length <= 12) return n;
  return '기본';
}

// 옵션 종류 추출: 'single'(단품) | 'bundle'(다량: 1+1, 3+1, 3+3 등 모든 X+Y 묶음)
// 시트의 option_name 컬럼이 적재되면 그것 사용. 현재는 productName 휴리스틱
function optionTypeOf(p) {
  // 1순위: 시트의 option_name 컬럼 (적재 후)
  if (p.option_name || p.optionName) {
    const opt = (p.option_name || p.optionName).toString();
    if (/\d+\s*\+\s*\d+/.test(opt)) return 'bundle';   // X+Y 모두 다량
    if (/단품|single|^1\s*개$/i.test(opt)) return 'single';
    return 'single'; // 기본 단품
  }
  // 2순위: productName 휴리스틱 (옛 데이터)
  const n = p.productName || '';
  if (/\d+\s*\+\s*\d+/.test(n)) return 'bundle';  // 1+1, 3+1, 3+3, 5+1 등
  return 'single';
}

// 옵션 필터 통과 여부
function passesOptionFilter(p) {
  if (currentOption === 'all') return true;
  return optionTypeOf(p) === currentOption;
}

// 매트릭스/드롭다운 그룹 키 — 항상 displayName (옵션은 별도 필터)
function keyOf(p) {
  return dispOf(p);
}

// 제품 드롭다운 — displayName 단위 (현재 선택 유지)
function populateProductSelect() {
  const sel = document.getElementById('productSelect');
  if (!sel) return;
  const prevValue = sel.value || currentProduct;
  buildPidToDisp();
  const groups = {};
  (SHEET.products || []).forEach(p => {
    if (!passesOptionFilter(p)) return;
    const key = keyOf(p);
    if (!groups[key]) groups[key] = 0;
    groups[key] += p.amount || 0;
  });
  const sorted = Object.entries(groups).sort((a, b) => b[1] - a[1]);
  sel.innerHTML = `<option value="">전체 제품 (매출 합산)</option>`
    + sorted.map(([key]) => `<option value="${key}">${key}</option>`).join('');
  // 이전 선택 복원
  if (prevValue && [...sel.options].some(o => o.value === prevValue)) {
    sel.value = prevValue;
  }
}

// 기본 기간: 종료일 = 어제 (오늘은 아직 적재 X) / 시작일 = 14일 전
function setDefaultRange() {
  if (!SHEET.daily.length) return;
  const fmt = (dt) => dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  const startDt = new Date(yesterday); startDt.setDate(startDt.getDate() - 13);
  currentStart = fmt(startDt);
  currentEnd = fmt(yesterday);
  document.getElementById('startDate').value = currentStart;
  document.getElementById('endDate').value = currentEnd;
  // picker 선택 가능 범위 — 시트 first ~ 어제 (오늘은 클릭 못하게)
  const first = SHEET.daily[0].date;
  document.getElementById('startDate').min = first;
  document.getElementById('startDate').max = currentEnd;
  document.getElementById('endDate').min = first;
  document.getElementById('endDate').max = currentEnd;
}

// localStorage 캐시 (5분 TTL) — 두번째 방문부턴 즉시 표시
const CACHE_KEY = 'momsolve_dashboard_v1';
const CACHE_TTL_MS = 5 * 60 * 1000;
const LAST_REFRESH_KEY = 'momsolve_last_refresh';

function formatTs(date) {
  const pad = (n) => String(n).padStart(2, '0');
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
}
function setLastRefreshDisplay() {
  const el = document.getElementById('lastRefresh');
  if (!el) return;
  const iso = localStorage.getItem(LAST_REFRESH_KEY);
  if (!iso) { el.textContent = '마지막 갱신: —'; return; }
  el.textContent = '마지막 갱신: ' + formatTs(new Date(iso));
}
function markRefreshed() {
  localStorage.setItem(LAST_REFRESH_KEY, new Date().toISOString());
  setLastRefreshDisplay();
}

function readCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj.ts || Date.now() - obj.ts > CACHE_TTL_MS) return null;
    return obj.data;
  } catch (e) { return null; }
}
function writeCache(data) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
  } catch (e) { /* quota 초과 등 무시 */ }
}

function applyData(data, fromCache) {
  SHEET.daily = data.daily || [];
  SHEET.channelCounts = data.channelCounts || [];  // v4 배포 전엔 빈 배열
  SHEET.products = data.products || [];
  setDefaultRange();
  rerenderAll();
  console.log((fromCache ? '⚡ 캐시 ' : '✅ 시트 ') + '로드 완료:', SHEET.daily.length, '일',
    SHEET.channelCounts.length ? `(채널별 주문건수 ${SHEET.channelCounts.length}일)` : '(주문건수는 quantity 근사)');
}

async function fetchFromSheet() {
  try {
    // 캐시 우회를 위해 timestamp 쿼리 추가
    const res = await fetch(WEBAPP_URL + '?action=getDashboardData&_=' + Date.now());
    const data = await res.json();
    if (!data.ok || !Array.isArray(data.daily)) {
      document.getElementById('headerDate').textContent = '시트 응답 형식 오류';
      console.warn('시트 응답:', data);
      return;
    }
    writeCache(data);
    applyData(data, false);
    markRefreshed();
  } catch (e) {
    if (!SHEET.daily.length) {
      document.getElementById('headerDate').textContent = '시트 로딩 실패 — F12 콘솔 확인';
    }
    console.error('시트 로드 실패:', e);
  }
}

// 수동 갱신 — 캐시 무시하고 시트 다시 fetch
async function manualRefresh() {
  const btn = document.getElementById('refreshBtn');
  const lastEl = document.getElementById('lastRefresh');
  if (btn) { btn.disabled = true; btn.textContent = '🔄 갱신 중...'; }
  if (lastEl) lastEl.textContent = '갱신 중...';
  localStorage.removeItem(CACHE_KEY); // 캐시 비우기
  try {
    await fetchFromSheet();
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🔄 수동 갱신'; }
  }
}

async function loadRealData() {
  // 1) 캐시 있으면 즉시 렌더 (즉각 반응) + 백그라운드에서 최신 가져오기
  const cached = readCache();
  if (cached) {
    applyData(cached, true);
  } else {
    document.getElementById('headerDate').textContent = '시트 데이터 로딩 중... (첫 방문 5~7초)';
  }
  // 2) 백그라운드에서 최신 가져와 화면 갱신
  await fetchFromSheet();
}

// 필터 변경 시 재렌더
document.getElementById('startDate').addEventListener('change', (e) => {
  currentStart = e.target.value;
  rerenderAll();
});
document.getElementById('endDate').addEventListener('change', (e) => {
  currentEnd = e.target.value;
  rerenderAll();
});
// 제품·옵션 드롭다운은 다음 페이지(제품군별 매출)에서 사용 예정
// 빠른 기간 버튼 — 모두 picker 의 날짜를 수정 + 재렌더 (어제 기준)
function applyQuickRange(range) {
  const fmt = (dt) => dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  let s, e;
  if (range === 'yesterday') {
    s = e = fmt(yesterday);
  } else if (range === '7' || range === '14') {
    const n = parseInt(range, 10);
    const startDt = new Date(yesterday);
    startDt.setDate(startDt.getDate() - (n - 1));
    s = fmt(startDt); e = fmt(yesterday);
  } else if (range === 'month') {
    s = fmt(new Date(today.getFullYear(), today.getMonth(), 1));
    e = fmt(yesterday);  // 이번달 1일~어제
    if (s > e) s = e;     // 이번달 1일이 어제보다 늦으면 (월 첫날) 한 점
  } else if (range === 'lastmonth') {
    s = fmt(new Date(today.getFullYear(), today.getMonth() - 1, 1));
    e = fmt(new Date(today.getFullYear(), today.getMonth(), 0));
  }
  currentStart = s;
  currentEnd = e;
  document.getElementById('startDate').value = s;
  document.getElementById('endDate').value = e;
  rerenderAll();
}
document.querySelectorAll('.quick-btn').forEach(btn => {
  btn.addEventListener('click', () => applyQuickRange(btn.dataset.range));
});

// Chart 객체 생성된 후에 호출 (이 스크립트 끝에 있어서 OK)
loadRealData();
</script>
